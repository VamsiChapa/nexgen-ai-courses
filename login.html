<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NexGen AI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="js/config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#0F172A;color:#F1F5F9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:48px 40px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.logo{font-size:1.8rem;font-weight:800;text-align:center;margin-bottom:4px}
.logo span{color:#6366F1}
.sub{text-align:center;font-size:.78rem;color:#94A3B8;margin-bottom:28px}
h2{font-size:1.2rem;font-weight:700;text-align:center;margin-bottom:6px}
.hint{text-align:center;font-size:.8rem;color:#64748B;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.72rem;font-weight:700;color:#94A3B8;margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.field input{width:100%;background:#0F172A;border:1px solid #334155;border-radius:8px;padding:11px 14px;color:#F1F5F9;font-family:'Poppins',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:#6366F1}
.btn{width:100%;background:#6366F1;color:#fff;border:none;border-radius:8px;padding:13px;font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{border-radius:8px;padding:10px 14px;font-size:.82rem;margin-top:14px;display:none}
.msg.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#FCA5A5}
.msg.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#FCD34D}
.msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86EFAC}
.links{margin-top:24px;padding-top:20px;border-top:1px solid #334155;display:flex;justify-content:space-between;font-size:.78rem}
.links a{color:#818CF8;text-decoration:none}
.links a:hover{text-decoration:underline}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Nex<span>Gen</span> AI</div>
  <div class="sub">Trainer Portal · Srikakulam</div>
  <h2>Sign In</h2>
  <p class="hint">Enter your credentials to access the trainer portal.</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') signIn()" />
  </div>
  <button class="btn" id="signin-btn" onclick="signIn()">Sign In →</button>

  <div class="msg error" id="msg-error"></div>
  <div class="msg warn"  id="msg-warn"></div>
  <div class="msg success" id="msg-success"></div>

  <div class="links">
    <a href="signup.html">Create account</a>
    <a href="#" onclick="forgotPassword()">Forgot password?</a>
  </div>
</div>

<script>
function sb() { return getSupabase(); }

// If already logged in, redirect
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const { data: { session } } = await sb().auth.getSession();
    if (session) checkAndRedirect(session.user.id);
  } catch(e) { console.warn('Session check failed:', e); }
});

async function signIn() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('signin-btn');

  hideMessages();
  if (!email || !password) { showMsg('error', 'Please fill in all fields.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in\u2026';

  try {
    const { data, error } = await sb().auth.signInWithPassword({ email, password });
    if (error) {
      btn.disabled = false; btn.textContent = 'Sign In \u2192';
      showMsg('error', error.message === 'Invalid login credentials'
        ? 'Incorrect email or password.' : error.message);
      return;
    }
    await checkAndRedirect(data.user.id);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Sign In \u2192';
    showMsg('error', 'Connection error. Please try again.');
  }
}

async function checkAndRedirect(uid) {
  const { data: profile, error } = await sb().from('profiles').select('*').eq('id', uid).single();

  if (error || !profile) {
    showMsg('error', 'Profile not found. Contact Vamsi Chapa.');
    document.getElementById('signin-btn').disabled = false;
    document.getElementById('signin-btn').textContent = 'Sign In \u2192';
    return;
  }

  await sb().rpc('touch_last_seen', { uid }).catch(() => {});

  if (profile.role === 'admin') {
    window.location.href = 'admin.html'; return;
  }
  if (profile.status === 'approved' || profile.status === 'direct') {
    window.location.href = 'dashboard.html'; return;
  }
  if (profile.status === 'pending') {
    showMsg('warn', '\u23f3 Your account is pending admin approval. You will receive an email once approved. Contact chapavamsi1731@gmail.com if urgent.');
    document.getElementById('signin-btn').disabled = false;
    document.getElementById('signin-btn').textContent = 'Sign In \u2192';
    return;
  }
  if (profile.status === 'rejected') {
    showMsg('error', '\u274c Your application was not approved. Contact chapavamsi1731@gmail.com for more information.');
    document.getElementById('signin-btn').disabled = false;
    document.getElementById('signin-btn').textContent = 'Sign In \u2192';
  }
}

async function forgotPassword() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showMsg('error', 'Enter your email address first.'); return; }
  const { error } = await sb().auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });
  showMsg(error ? 'error' : 'success',
    error ? error.message : '\ud83d\udce7 Password reset link sent to ' + email);
}

function showMsg(type, text) {
  hideMessages();
  const el = document.getElementById('msg-' + type);
  el.textContent = text; el.style.display = 'block';
}
function hideMessages() {
  ['error','warn','success'].forEach(t => {
    document.getElementById('msg-' + t).style.display = 'none';
  });
}
</script>
</body>
</html>
