const lessons=[
  // MODULE 1 — Python Fundamentals
  {day:1,mod:1,title:'Welcome to Python',objectives:['Install Python and run your first program','Understand what Python is used for','Write and run a basic print statement'],
   content:`<p>Python is a programming language used by NASA, Google, Netflix, and thousands of companies. It reads almost like English, which makes it the perfect first language. Today you write your very first Python program!</p>
<p>Python can build websites, analyse data, create AI chatbots, automate boring tasks, and much more. The best way to run Python right now is <strong>Google Colab</strong> — it works in your browser with zero installation.</p>`,
   code:`# Your very first Python program!
print("Hello, World!")
print("My name is Vamsi")
print("I am learning Python at NexGen Computers")

# Python can do math too
print(2 + 3)
print(10 * 5)
print(100 / 4)`,
   resources:[{title:'Python for Beginners — Full Course',url:'https://www.youtube.com/results?search_query=python+for+beginners+full+course+hindi'},{title:'Google Colab — Getting Started',url:'https://www.youtube.com/results?search_query=google+colab+tutorial+beginners+python'}],
   exercise:'Open Google Colab and type the code above. Change "My name is Vamsi" to your own name and run it.',
   keyTerms:['Python','program','print()','Google Colab','output']},

  {day:2,mod:1,title:'Variables and Data Types',objectives:['Store values in variables','Know the 4 basic data types','Use type() to check a variable'],
   content:`<p>A <strong>variable</strong> is like a labelled box where you store information. You can store numbers, words, or yes/no values. Python has 4 basic data types: <strong>int</strong> (whole numbers), <strong>float</strong> (decimal numbers), <strong>str</strong> (text), and <strong>bool</strong> (True or False).</p>
<p>Variable names cannot have spaces or start with a number. Use underscores like <code>my_age</code>.</p>`,
   code:`# Storing values in variables
name = "Priya"
age = 16
height = 5.4
is_student = True

# Printing variables
print(name)
print(age)
print(height)
print(is_student)

# Checking the type
print(type(name))    # <class 'str'>
print(type(age))     # <class 'int'>
print(type(height))  # <class 'float'>
print(type(is_student))  # <class 'bool'>`,
   resources:[{title:'Python Variables Explained',url:'https://www.youtube.com/results?search_query=python+variables+data+types+tutorial+beginners'},{title:'Python Data Types in Telugu',url:'https://www.youtube.com/results?search_query=python+data+types+tutorial+telugu'}],
   exercise:'Create 4 variables: your name, age, favourite subject, and whether you like coding (True/False). Print all of them.',
   keyTerms:['variable','int','float','str','bool','type()']},

  {day:3,mod:1,title:'Taking Input and Doing Math',objectives:['Get input from the user','Perform arithmetic in Python','Convert between data types'],
   content:`<p>The <code>input()</code> function lets your program ask the user a question. Whatever the user types is returned as a <strong>string</strong> (text). If you want to use it as a number, you must convert it with <code>int()</code> or <code>float()</code>.</p>
<p>Python arithmetic: <code>+</code> add, <code>-</code> subtract, <code>*</code> multiply, <code>/</code> divide, <code>**</code> power, <code>%</code> remainder.</p>`,
   code:`# Getting user input
name = input("What is your name? ")
print("Hello,", name)

age = int(input("How old are you? "))
next_year = age + 1
print("Next year you will be", next_year)

# Math operations
a = 25
b = 4
print(a + b)   # 29
print(a - b)   # 21
print(a * b)   # 100
print(a / b)   # 6.25
print(a ** 2)  # 625 (25 squared)
print(a % b)   # 1 (remainder)`,
   resources:[{title:'Python Input Function Tutorial',url:'https://www.youtube.com/results?search_query=python+input+function+tutorial+beginners'},{title:'Python Math Operations',url:'https://www.youtube.com/results?search_query=python+arithmetic+operators+tutorial'}],
   exercise:'Write a program that asks for two numbers and prints their sum, difference, product, and quotient.',
   keyTerms:['input()','int()','float()','arithmetic','type conversion']},

  {day:4,mod:1,title:'If-Else Decisions',objectives:['Use if, elif, and else','Understand comparison operators','Build a grade calculator'],
   content:`<p>Programs need to make decisions. <strong>if/elif/else</strong> lets your code choose different paths based on conditions. Comparison operators: <code>==</code> equal, <code>!=</code> not equal, <code>&gt;</code> greater, <code>&lt;</code> less, <code>&gt;=</code> greater or equal, <code>&lt;=</code> less or equal.</p>
<p>Indentation (4 spaces or 1 tab) is mandatory in Python — it defines which code belongs inside the if block.</p>`,
   code:`# Simple if-else
marks = int(input("Enter your marks (0-100): "))

if marks >= 90:
    grade = "A+"
    print("Outstanding!")
elif marks >= 80:
    grade = "A"
    print("Excellent!")
elif marks >= 70:
    grade = "B"
    print("Good work!")
elif marks >= 60:
    grade = "C"
    print("Satisfactory")
elif marks >= 35:
    grade = "D"
    print("Pass, but work harder!")
else:
    grade = "F"
    print("Study harder and try again!")

print("Your grade:", grade)`,
   resources:[{title:'Python If Else Tutorial Beginners',url:'https://www.youtube.com/results?search_query=python+if+else+elif+tutorial+beginners'},{title:'Python Conditions Explained',url:'https://www.youtube.com/results?search_query=python+conditional+statements+examples'}],
   exercise:'Build a program that asks for age and prints: "Child" (< 13), "Teenager" (13-17), "Adult" (18-59), "Senior" (60+).',
   keyTerms:['if','elif','else','comparison operator','indentation','condition']},

  {day:5,mod:1,title:'Loops — Repeating Actions',objectives:['Use for loops to repeat code','Use while loops with a condition','Control loops with break and continue'],
   content:`<p>Loops let you run the same code many times without copying and pasting. <strong>for loops</strong> run a fixed number of times. <strong>while loops</strong> keep running as long as a condition is True. <strong>break</strong> exits the loop early. <strong>continue</strong> skips the current step and moves to the next.</p>`,
   code:`# For loop — counting
for i in range(1, 6):
    print("Count:", i)

# For loop — printing items
fruits = ["mango", "banana", "apple"]
for fruit in fruits:
    print("I like", fruit)

# While loop
number = 1
while number <= 5:
    print("Square of", number, "is", number ** 2)
    number += 1

# Break and continue
for i in range(1, 11):
    if i == 5:
        continue  # skip 5
    if i == 8:
        break     # stop at 8
    print(i)`,
   resources:[{title:'Python Loops For While Tutorial',url:'https://www.youtube.com/results?search_query=python+for+loop+while+loop+tutorial+beginners'},{title:'Python Range Function Explained',url:'https://www.youtube.com/results?search_query=python+range+function+explained+tutorial'}],
   exercise:'Write a program that prints all even numbers from 1 to 50 using a for loop.',
   keyTerms:['for loop','while loop','range()','break','continue','iteration']},

  {day:6,mod:1,title:'Lists — Storing Many Values',objectives:['Create and modify lists','Use list methods: append, remove, sort','Slice a list to get parts of it'],
   content:`<p>A <strong>list</strong> stores multiple values in one variable, like a shopping list. Lists are <strong>ordered</strong> (items keep their position) and <strong>mutable</strong> (you can change them). Access items using their index — Python starts counting from 0!</p>`,
   code:`# Creating a list
students = ["Ravi", "Priya", "Kiran", "Anita"]

# Accessing items (index starts at 0)
print(students[0])   # Ravi
print(students[-1])  # Anita (last item)

# Adding and removing
students.append("Sai")       # add to end
students.remove("Kiran")     # remove by value
students.insert(1, "Deepa")  # insert at position 1

# Useful operations
print(len(students))   # number of items
print(students)
students.sort()        # sort alphabetically
print(students)

# Slicing
marks = [85, 92, 78, 95, 88, 73]
top_3 = marks[:3]   # first 3
print(top_3)`,
   resources:[{title:'Python Lists Complete Tutorial',url:'https://www.youtube.com/results?search_query=python+lists+tutorial+complete+beginners'},{title:'Python List Methods All',url:'https://www.youtube.com/results?search_query=python+list+methods+append+remove+sort'}],
   exercise:'Create a list of 5 subject marks. Find and print the highest, lowest, and average mark.',
   keyTerms:['list','index','append()','remove()','sort()','slicing']},

  {day:7,mod:1,title:'Dictionaries — Key-Value Storage',objectives:['Create and use dictionaries','Access, add, and delete key-value pairs','Loop through a dictionary'],
   content:`<p>A <strong>dictionary</strong> stores data as <strong>key: value</strong> pairs — like a real dictionary where you look up a word (key) to get its meaning (value). Use dictionaries when items have labels, not positions.</p>`,
   code:`# Creating a dictionary
student = {
    "name": "Priya",
    "age": 16,
    "school": "NexGen High School",
    "marks": 92
}

# Accessing values
print(student["name"])
print(student.get("marks"))

# Adding and updating
student["city"] = "Srikakulam"
student["marks"] = 95  # update existing

# Deleting
del student["age"]

# Looping through
for key, value in student.items():
    print(key, "->", value)

# Practical example
attendance = {"Monday": True, "Tuesday": False, "Wednesday": True}
present_days = sum(1 for v in attendance.values() if v)
print("Days present:", present_days)`,
   resources:[{title:'Python Dictionary Tutorial',url:'https://www.youtube.com/results?search_query=python+dictionary+tutorial+beginners'},{title:'Python Dict Methods Explained',url:'https://www.youtube.com/results?search_query=python+dictionary+methods+keys+values+items'}],
   exercise:'Create a dictionary for a student with name, 5 subjects, and marks. Print subjects where marks > 80.',
   keyTerms:['dictionary','key','value','get()','items()','del']},

  {day:8,mod:1,title:'Functions — Reusable Code Blocks',objectives:['Define and call functions','Use parameters and return values','Understand local vs global variables'],
   content:`<p>A <strong>function</strong> is a named block of code that does one specific job. You define it once and call it as many times as you need. Functions make your code shorter, cleaner, and easier to fix. <strong>Parameters</strong> are inputs; <strong>return</strong> sends a value back out.</p>`,
   code:`# Defining a function
def greet(name):
    message = "Hello, " + name + "! Welcome to NexGen."
    return message

# Calling the function
print(greet("Priya"))
print(greet("Ravi"))

# Function with multiple parameters
def calculate_grade(marks):
    if marks >= 90: return "A+"
    elif marks >= 80: return "A"
    elif marks >= 70: return "B"
    elif marks >= 60: return "C"
    elif marks >= 35: return "Pass"
    else: return "Fail"

subjects = {"Maths": 88, "Science": 72, "Telugu": 95, "English": 65}
for subject, mark in subjects.items():
    print(subject, ":", mark, "->", calculate_grade(mark))

# Default parameter
def power(base, exponent=2):
    return base ** exponent

print(power(5))    # 25 (uses default exponent=2)
print(power(2, 8)) # 256`,
   resources:[{title:'Python Functions Tutorial',url:'https://www.youtube.com/results?search_query=python+functions+tutorial+beginners+def+return'},{title:'Python Parameters Arguments',url:'https://www.youtube.com/results?search_query=python+function+parameters+arguments+tutorial'}],
   exercise:'Write a function is_prime(n) that returns True if n is a prime number, False otherwise.',
   keyTerms:['function','def','parameter','return','call','default argument']},

  {day:9,mod:1,title:'String Operations',objectives:['Format strings with f-strings','Use common string methods','Process user text input'],
   content:`<p>Strings are everywhere in Python programs — names, messages, data. Python has many built-in string tools. <strong>f-strings</strong> are the modern way to insert variables into text. String methods like <code>.upper()</code>, <code>.strip()</code>, and <code>.split()</code> help clean and process text.</p>`,
   code:`name = "priya sharma"
city = "Srikakulam"
score = 95.5

# f-strings (most modern approach)
print(f"Hello, {name.title()}!")
print(f"Score: {score:.1f}%")

# String methods
print(name.upper())       # PRIYA SHARMA
print(name.capitalize())  # Priya sharma
print(name.title())       # Priya Sharma
print("  hello  ".strip()) # "hello" (removes spaces)

# Splitting and joining
sentence = "Python is fun to learn"
words = sentence.split(" ")
print(words)           # ['Python', 'is', 'fun', 'to', 'learn']
print(len(words))      # 5

joined = "-".join(words)
print(joined)          # Python-is-fun-to-learn

# Checking contents
email = "student@nexgen.in"
print("@" in email)         # True
print(email.endswith(".in")) # True`,
   resources:[{title:'Python String Methods Tutorial',url:'https://www.youtube.com/results?search_query=python+string+methods+tutorial+complete'},{title:'Python f-strings Tutorial',url:'https://www.youtube.com/results?search_query=python+f+strings+format+tutorial+beginners'}],
   exercise:'Write a program that asks for a full name and prints: number of characters, name in ALL CAPS, and each word separately.',
   keyTerms:['f-string','string method','split()','join()','strip()','upper()']},

  {day:10,mod:1,title:'Files & Error Handling',objectives:['Read and write text files','Handle errors with try-except','Understand common Python exceptions'],
   content:`<p>Real programs read and write files — CSV, text, logs. Use <code>open()</code> with a <strong>with</strong> block so the file closes automatically. <strong>try-except</strong> catches errors gracefully instead of crashing. Common exceptions: <code>FileNotFoundError</code>, <code>ValueError</code>, <code>ZeroDivisionError</code>.</p>`,
   code:`# Writing to a file
with open("students.txt", "w") as f:
    f.write("Priya, 92\n")
    f.write("Ravi, 85\n")
    f.write("Kiran, 78\n")

# Reading from a file
with open("students.txt", "r") as f:
    for line in f:
        print(line.strip())

# Appending to a file
with open("students.txt", "a") as f:
    f.write("Anita, 95\n")

# Error handling
def safe_divide(a, b):
    try:
        result = a / b
        return result
    except ZeroDivisionError:
        print("Error: Cannot divide by zero!")
        return None
    except TypeError:
        print("Error: Please provide numbers!")
        return None

print(safe_divide(10, 2))   # 5.0
print(safe_divide(10, 0))   # Error message
print(safe_divide(10, "x")) # Error message`,
   resources:[{title:'Python File Handling Tutorial',url:'https://www.youtube.com/results?search_query=python+file+handling+read+write+tutorial'},{title:'Python Try Except Tutorial',url:'https://www.youtube.com/results?search_query=python+try+except+error+handling+tutorial'}],
   exercise:'Write a program that reads students.txt, calculates the average marks, and saves the result to a new file results.txt.',
   keyTerms:['open()','read','write','try','except','FileNotFoundError']},

  // MODULE 2 — Intermediate Python for AI
  {day:11,mod:2,title:'NumPy — Numbers at Scale',objectives:['Create NumPy arrays','Perform array operations','Understand why NumPy is faster than lists'],
   content:`<p><strong>NumPy</strong> is Python's library for working with large grids of numbers (arrays). AI and data science use NumPy everywhere because it processes millions of numbers in milliseconds — far faster than Python lists. An <strong>array</strong> is like a list, but all items must be the same type, which makes operations blazing fast.</p>`,
   code:`import numpy as np

# Creating arrays
numbers = np.array([10, 20, 30, 40, 50])
print(numbers)
print(numbers.shape)   # (5,)
print(numbers.dtype)   # int64

# Math on the whole array at once!
print(numbers * 2)      # [20 40 60 80 100]
print(numbers + 5)      # [15 25 35 45 55]
print(np.sqrt(numbers)) # square root of each

# 2D arrays (like a table)
marks = np.array([[85, 90, 78],
                  [92, 88, 95],
                  [70, 75, 80]])
print("Shape:", marks.shape)  # (3, 3)
print("Average per student:", marks.mean(axis=1))
print("Highest in class:", marks.max())

# Creating special arrays
zeros = np.zeros((3, 3))
ones = np.ones((2, 4))
random = np.random.randint(0, 100, (3, 3))`,
   resources:[{title:'NumPy Tutorial for Beginners',url:'https://www.youtube.com/results?search_query=numpy+tutorial+beginners+python+data+science'},{title:'NumPy Complete Course',url:'https://www.youtube.com/results?search_query=numpy+complete+course+python+arrays'}],
   exercise:'Create a 5×5 random array of marks (50-100). Find the highest, lowest, and average for each row.',
   keyTerms:['NumPy','array','shape','dtype','vectorisation','ndarray']},

  {day:12,mod:2,title:'Pandas — Working with Data Tables',objectives:['Create DataFrames from dictionaries','Filter, sort, and group data','Read a CSV file with Pandas'],
   content:`<p><strong>Pandas</strong> is Python's spreadsheet library. A <strong>DataFrame</strong> is a table with rows and columns — like Excel, but programmable. Pandas makes it easy to load data from CSV files, filter rows, sort by columns, and calculate group statistics.</p>`,
   code:`import pandas as pd

# Creating a DataFrame
data = {
    "Name": ["Priya", "Ravi", "Kiran", "Anita", "Sai"],
    "Marks": [92, 85, 78, 95, 88],
    "City": ["Srikakulam", "Vizag", "Srikakulam", "Vizag", "Srikakulam"]
}
df = pd.DataFrame(data)
print(df)

# Exploring data
print(df.shape)        # (5, 3)
print(df.dtypes)       # data types of each column
print(df.describe())   # statistics summary

# Filtering rows
top_students = df[df["Marks"] >= 90]
print(top_students)

# Sorting
sorted_df = df.sort_values("Marks", ascending=False)
print(sorted_df)

# Group statistics
print(df.groupby("City")["Marks"].mean())

# Reading CSV (try with your own file)
# df = pd.read_csv("students.csv")`,
   resources:[{title:'Pandas Tutorial Complete Beginners',url:'https://www.youtube.com/results?search_query=pandas+tutorial+beginners+python+dataframe'},{title:'Pandas for Data Analysis',url:'https://www.youtube.com/results?search_query=pandas+data+analysis+tutorial+python+csv'}],
   exercise:'Download any CSV dataset from Kaggle. Load it with Pandas and print: shape, column names, and top 5 rows.',
   keyTerms:['Pandas','DataFrame','CSV','filter','groupby','describe()']},

  {day:13,mod:2,title:'Matplotlib — Visualising Data',objectives:['Create line, bar, and pie charts','Add titles and labels','Save a chart to a file'],
   content:`<p>Numbers alone are hard to understand. <strong>Matplotlib</strong> turns data into charts. A chart communicates patterns instantly. The basic workflow: prepare data → call plt.figure() → plot → add labels → plt.show(). Always label your axes — a chart without labels is useless.</p>`,
   code:`import matplotlib.pyplot as plt
import numpy as np

# Line chart — marks over tests
tests = [1, 2, 3, 4, 5]
priya = [65, 72, 80, 85, 92]
ravi = [70, 68, 75, 78, 85]

plt.figure(figsize=(8, 5))
plt.plot(tests, priya, marker='o', label='Priya', color='blue')
plt.plot(tests, ravi, marker='s', label='Ravi', color='orange')
plt.title("Student Progress Over 5 Tests")
plt.xlabel("Test Number")
plt.ylabel("Marks")
plt.legend()
plt.grid(True)
plt.savefig("progress.png")
plt.show()

# Bar chart — subject comparison
subjects = ["Maths", "Science", "English", "Telugu"]
marks = [88, 92, 75, 95]
plt.figure(figsize=(6, 4))
plt.bar(subjects, marks, color=['blue','green','orange','red'])
plt.title("Subject Marks")

  {day:17,mod:2,title:'Regular Expressions — Pattern Matching',objectives:['Find patterns in text with re module','Extract emails, phone numbers, dates','Use re.search, re.findall, re.sub'],
   content:`<p><strong>Regular expressions (regex)</strong> are patterns that find text matching a specific structure — like a wildcard on steroids. Used everywhere in AI for data cleaning: extract all emails from a document, remove HTML tags, find phone numbers. The <code>re</code> module is built into Python.</p>`,
   code:`import re

text = """
Contact us:
Email: priya@nexgen.in, support@nex-gen.in
Phone: 9876543210, +91-8765432109
Date: 15/08/2024
Website: https://nex-gen.in
"""

# Find all emails
emails = re.findall(r'[\w.-]+@[\w.-]+\.\w+', text)

# Find phone numbers

# Find dates

  {day:21,mod:3,title:'What is Artificial Intelligence?',objectives:['Understand AI, ML, and DL hierarchy','Know the types of ML learning','Identify real-world AI applications'],
   content:`<p><strong>Artificial Intelligence (AI)</strong> is the ability of machines to perform tasks that normally require human intelligence. <strong>Machine Learning (ML)</strong> is a type of AI where machines <em>learn from data</em> instead of being programmed with rules. <strong>Deep Learning (DL)</strong> is a type of ML using neural networks inspired by the human brain.</p>
<p>Types of ML: <strong>Supervised</strong> (learning from labelled examples), <strong>Unsupervised</strong> (finding patterns without labels), <strong>Reinforcement</strong> (learning by reward and punishment).</p>`,
   code:`# Understanding AI through a simple example
# Without AI: rule-based spam filter
def is_spam_rules(email):
    spam_words = ["free", "win", "prize", "click here", "limited offer"]
    return any(word in email.lower() for word in spam_words)

# With ML: the computer learns the patterns from thousands of examples
# We don't write rules — we show examples of spam and not-spam
# The algorithm figures out the rules by itself

# Simple ML concept demonstration
examples = [
    ("Win a free prize! Click here!", "spam"),
    ("Meeting at 3pm tomorrow", "not spam"),
    ("LIMITED OFFER! Act now!", "spam"),
    ("Project update from team", "not spam"),
    ("Claim your FREE gift card", "spam")
]

print("Rule-based filter:")
for email, label in examples:
    result = "spam" if is_spam_rules(email) else "not spam"
    match = "✓" if result == label else "✗"
    print(f"  {match} '{email[:40]}...' → {result}")`,

  {day:23,mod:3,title:'How Machine Learning Learns',objectives:['Understand features and labels','Grasp the concept of loss','See how gradient descent works'],
   content:`<p>ML models learn by <strong>minimising loss</strong> — the difference between predicted and actual values. <strong>Gradient descent</strong> is the key algorithm: it adjusts model parameters step by step in the direction that reduces loss. The <strong>learning rate</strong> controls how big each step is. Too large: overshoots. Too small: takes forever.</p>`,
   code:`import numpy as np
import matplotlib.pyplot as plt

# Simple linear regression from scratch
# Task: predict marks from study hours

hours = np.array([1, 2, 3, 4, 5, 6, 7, 8])
marks = np.array([40, 50, 58, 65, 72, 80, 87, 93])

# Our model: marks = w * hours + b
# Start with random weights
w, b = 0.0, 0.0
lr = 0.01  # learning rate

losses = []
for epoch in range(1000):
    # Forward pass: predict
    pred = w * hours + b

    # Calculate loss (Mean Squared Error)
    loss = np.mean((pred - marks) ** 2)
    losses.append(loss)

    # Gradient descent: calculate gradients
    dw = np.mean(2 * (pred - marks) * hours)
    db = np.mean(2 * (pred - marks))

    # Update weights
    w -= lr * dw
    b -= lr * db

print(f"Learned: marks = {w:.2f} * hours + {b:.2f}")
print(f"Final loss: {losses[-1]:.2f}")

# Predict
study_hours = 9
predicted = w * study_hours + b
print(f"\nIf you study {study_hours} hours, expected marks: {predicted:.0f}")`,

  {day:25,mod:3,title:'Decision Trees and Random Forests',objectives:['Understand how decision trees split data','Identify overfitting','Use Random Forest to improve accuracy'],
   content:`<p>A <strong>Decision Tree</strong> splits data by asking yes/no questions (like 20 questions). It's easy to understand but prone to <strong>overfitting</strong> — memorising training data instead of learning patterns. <strong>Random Forest</strong> trains hundreds of trees on random subsets of data and averages their predictions — much more robust and accurate.</p>`,
   code:`from sklearn.datasets import load_breast_cancer

tree.fit(X_train, y_train)

# Random Forest — more robust

  {day:27,mod:3,title:'Natural Language Processing Basics',objectives:['Tokenise and clean text','Calculate word frequency','Build a simple text classifier'],
   content:`<p><strong>Natural Language Processing (NLP)</strong> teaches computers to understand human language. Core steps: tokenisation (split text into words), stop word removal (remove "the", "is", "a"), stemming/lemmatisation (reduce words to root form), and vectorisation (convert text to numbers). Today you build a simple sentiment detector.</p>`,
   code:`import re
from collections import Counter

# Simple NLP from scratch
def tokenise(text):
    text = text.lower()
    text = re.sub(r'[^a-z\s]', '', text)
    return text.split()

def remove_stopwords(tokens):
    stopwords = {'the','is','a','an','and','or','but','in','on','at','to','for','of','it','this','that'}
    return [t for t in tokens if t not in stopwords]

# Analyse a review
review = "This Python course is absolutely wonderful! The teachers are very helpful and the content is excellent and easy to understand."

tokens = tokenise(review)
clean = remove_stopwords(tokens)
freq = Counter(clean)
print("Most common words:", freq.most_common(5))

# Simple sentiment analysis
positive_words = {"wonderful","excellent","helpful","easy","great","amazing","best"}
negative_words = {"terrible","bad","boring","difficult","worst","awful","horrible"}

pos = sum(1 for w in tokens if w in positive_words)
neg = sum(1 for w in tokens if w in negative_words)
if pos > neg: sentiment = "POSITIVE"
elif neg > pos: sentiment = "NEGATIVE"
else: sentiment = "NEUTRAL"

print(f"\nPositive words: {pos}, Negative words: {neg}")
print(f"Sentiment: {sentiment}")`,

  {day:31,mod:3,title:'Responsible AI & Ethics',objectives:['Understand AI bias and fairness','Know data privacy principles','Recognise when AI should not be used'],
   content:`<p>AI is powerful but can cause harm if used carelessly. <strong>AI bias</strong> occurs when training data reflects human prejudices — biased data produces biased predictions. <strong>Privacy</strong>: AI systems trained on personal data can leak private information. <strong>Hallucination</strong>: LLMs confidently state false information. As an AI builder, you are responsible for these impacts.</p>`,
   code:`# Demonstrating bias in data
import pandas as pd
import numpy as np

# Biased hiring data (historical discrimination baked in)
np.random.seed(42)
n = 200
data = {
    "name": [f"Person_{i}" for i in range(n)],
    "gender": np.random.choice(["M","F"], n),
    "years_experience": np.random.randint(1, 15, n),
    "hired": None
}
df = pd.DataFrame(data)

# BIASED hiring: males with same experience hired more
def biased_hire(row):
    base = row["years_experience"] > 5
    bias = row["gender"] == "M"
    return int(base and (bias or np.random.random() > 0.6))

df["hired"] = df.apply(biased_hire, axis=1)

# Show the bias
print("=== Hiring Rate by Gender ===")
print(df.groupby("gender")["hired"].mean().apply(lambda x: f"{x:.0%}"))

# What a fair model should do: ignore gender
from sklearn.linear_model import LogisticRegression
fair_model = LogisticRegression()
X_fair = df[["years_experience"]]  # gender excluded!
fair_model.fit(X_fair, df["hired"])
print("\nFair model uses only experience, not gender.")`,

let currentDay=1;
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  modules.forEach(m=>{
    const hdr=document.createElement('div');hdr.className='mod-header';hdr.textContent=m.title;sb.appendChild(hdr);
    for(let d=m.days[0];d<=m.days[1];d++){
      const btn=document.createElement('button');btn.className='day-btn'+(d===currentDay?' active':'')+(completed.includes(d)?' done':'');
      btn.id=`btn-${d}`;btn.innerHTML=`<span class="dot"></span>Day ${d}`;
      btn.onclick=()=>loadDay(d);sb.appendChild(btn);
    }
  });
}
function loadDay(n){
  currentDay=n;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(`btn-${n}`);if(btn)btn.classList.add('active');
  const l=lessons.find(x=>x.day===n);if(!l)return;
  const mod=modules.find(m=>m.id===l.mod);
  const done=completed.includes(n);
  document.getElementById('main').innerHTML=`
    <div class="day-header">
      <div class="day-label">Day ${n} of 45 · ${mod.title}</div>
      <h1 class="day-title">${l.title}</h1>
      <span class="mod-tag">Module ${l.mod}</span>
    </div>
    <div class="card"><h3>Learning Objectives</h3><ul>${l.objectives.map(o=>`<li>${o}</li>`).join('')}</ul></div>
    <div class="card"><h3>Content</h3>${l.content}</div>
    <div class="card"><h3>Code</h3><div class="code-block">${escHtml(l.code)}</div></div>
    <div class="card resources"><h3>Resources</h3>${l.resources.map(r=>`<a href="${r.url}" target="_blank" rel="noopener">${r.title}</a>`).join('')}</div>
    <div class="card"><h3>Exercise</h3><div class="exercise"><p>${l.exercise}</p></div></div>
    <div class="card"><h3>Key Terms</h3><div class="terms">${l.keyTerms.map(t=>`<span class="term">${t}</span>`).join('')}</div></div>
    <button class="btn-complete" id="btn-done" onclick="markComplete(${n})" ${done?'disabled':''}>
      ${done?'Completed ✓':'Mark Day Complete'}
    </button>`;
  updateHeader();
}
function markComplete(n){
  if(!completed.includes(n))completed.push(n);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(completed));
  const btn=document.getElementById('btn-done');if(btn){btn.disabled=true;btn.textContent='Completed ✓';}
  const sb=document.getElementById(`btn-${n}`);if(sb)sb.classList.add('done');
  updateHeader();
  if(n<45)setTimeout(()=>loadDay(n+1),800);
}
function updateHeader(){
  document.getElementById('hdr-progress').textContent=`${completed.length}/45 days`;
}
buildSidebar();loadDay(1);
