{day:35,mod:4,title:"Data & Baseline Model",objectives:["Load and prepare project dataset","Train baseline model and establish performance","Complete initial EDA for project"],content:`<p>Day 38: execute your project plan. Load data, run EDA, engineer features, and train a quick baseline model. The baseline is important — it tells you the minimum performance any "smart" approach must beat. A simple model (Logistic Regression, majority class) is the baseline.</p><p>Common issues today: data not loading (check path/encoding), features in wrong format (check dtypes), target variable leakage (audit your feature list). Debug methodically — print shapes and dtypes at each step.</p>`,code:`# Baseline model template\nfrom sklearn.dummy import DummyClassifier\nfrom sklearn.metrics import f1_score\n\n# Load and inspect\ndf = pd.read_csv("your_data.csv")\nprint(df.shape, df.dtypes)\nprint(df.isnull().sum())\n\n# Quick prep\nX = df.drop('target', axis=1)\ny = df['target']\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\n\n# Baseline: majority class predictor\nbaseline = DummyClassifier(strategy='most_frequent')\nbaseline.fit(X_train, y_train)\nbaseline_score = f1_score(y_test, baseline.predict(X_test), average='weighted')\nprint(f"Baseline F1: {baseline_score:.3f}")\n\n# Your model must beat this!\n# Now try a simple Logistic Regression as first real model\nfrom sklearn.linear_model import LogisticRegression\nmodel = LogisticRegression(max_iter=1000)\nmodel.fit(X_train, y_train)\nprint(f"LR F1: {f1_score(y_test, model.predict(X_test), average='weighted'):.3f}")`,resources:[{title:"ML Baseline Model Tutorial",url:"https://www.youtube.com/results?search_query=machine+learning+baseline+model+tutorial+Python"},{title:"Data Science Project Day 1",url:"https://www.youtube.com/results?search_query=data+science+project+complete+walkthrough+tutorial"}],exercise:"Complete: (1) data loading with full EDA, (2) baseline model score documented, (3) first real model beating baseline, (4) commit code to GitHub with clear commit message.",keyTerms:["baseline","DummyClassifier","EDA","feature audit","GitHub commit"]},
{day:36,mod:4,title:"Model Tuning & Feature Engineering",objectives:["Improve model beyond baseline through tuning","Engineer project-specific features","Document experiment results"],content:`<p>Today: iterate to improve your model. Apply the full ML toolkit — feature engineering, hyperparameter tuning, trying different algorithms, handling class imbalance if present. Document every experiment: what you tried, what changed, what the result was.</p><p>Improvement strategies: (1) more features / better features, (2) tune hyperparameters with CV, (3) try XGBoost or Random Forest if using linear models, (4) handle class imbalance with SMOTE or class_weight, (5) ensemble your best 2–3 models.</p>`,code:`from sklearn.model_selection import RandomizedSearchCV\nfrom imblearn.over_sampling import SMOTE  # pip install imbalanced-learn\n\n# Handle imbalance if needed\nprint("Class distribution:", pd.Series(y_train).value_counts())\n\n# If imbalanced:\nsmote = SMOTE(random_state=42)\nX_resampled, y_resampled = smote.fit_resample(X_train_processed, y_train)\n\n# Tune best model\nparam_dist = {\n    'n_estimators': [100, 200, 300],\n    'max_depth': [3, 5, 7, None],\n    'learning_rate': [0.05, 0.1, 0.2]\n}\n\nsearch = RandomizedSearchCV(\n    xgb.XGBClassifier(random_state=42),\n    param_dist, n_iter=30, cv=5, scoring='f1_weighted'\n)\nsearch.fit(X_resampled, y_resampled)\nprint(f"Best F1: {search.best_score_:.3f}")\nprint(f"Best params: {search.best_params_}")`,resources:[{title:"Imbalanced Dataset Handling Python",url:"https://www.youtube.com/results?search_query=imbalanced+dataset+SMOTE+Python+tutorial"},{title:"Model Improvement Strategies ML",url:"https://www.youtube.com/results?search_query=improve+machine+learning+model+accuracy+strategies"}],exercise:"Run 3 different model configurations, document results in a table (model, hyperparams, CV score, test score). Pick the best and save it with joblib. Push to GitHub.",keyTerms:["SMOTE","class imbalance","hyperparameter tuning","experiment tracking","joblib","model selection"]},
{day:37,mod:4,title:"Building the Streamlit App",objectives:["Build interactive Streamlit UI for your project","Connect ML model to user interface","Test all user flows"],content:`<p>Your Streamlit app is the face of your project — it's what people will interact with. Make it tell a story: explain the problem, show the data, demonstrate the model, let users interact.</p><p>Streamlit best practices: (1) use <code>@st.cache_data</code> on data loading to avoid reloading every interaction, (2) add loading spinners for slow operations, (3) show model confidence/probability, not just predictions, (4) handle errors gracefully with <code>st.error()</code>.</p>`,code:`import streamlit as st\nimport joblib\nimport pandas as pd\n\n# Cache model loading\n@st.cache_resource\ndef load_model():\n    return joblib.load("model.pkl")\n\nmodel = load_model()\n\nst.title("Your Project Title")\nst.write("Brief description of what this does")\n\n# Tabs for better organisation\ntab1, tab2, tab3 = st.tabs(["Make Prediction", "Explore Data", "About"])\n\nwith tab1:\n    st.subheader("Input Features")\n    # Dynamic input widgets\n    age = st.slider("Age", 18, 90, 30)\n    income = st.number_input("Annual Income ($)", 0, 500000, 50000)\n    \n    if st.button("Predict", type="primary"):\n        with st.spinner("Analysing..."):\n            features = pd.DataFrame({'age':[age], 'income':[income]})\n            pred = model.predict(features)[0]\n            prob = model.predict_proba(features).max()\n            st.success(f"Prediction: {pred}")\n            st.info(f"Confidence: {prob:.1%}")`,resources:[{title:"Streamlit App Development Tutorial",url:"https://www.youtube.com/results?search_query=Streamlit+app+development+machine+learning+tutorial"},{title:"Streamlit Components and Layout",url:"https://www.youtube.com/results?search_query=Streamlit+layout+components+tabs+sidebar+tutorial"}],exercise:"Build the full Streamlit app for your project. Must include: (1) prediction interface, (2) data visualisation tab, (3) about tab, (4) error handling, (5) load time <3 seconds with caching.",keyTerms:["Streamlit","cache_resource","cache_data","st.tabs","st.spinner","session_state"]},
{day:38,mod:4,title:"Deployment & Documentation",objectives:["Deploy app to Streamlit Cloud","Write a complete README","Record a demo walkthrough"],content:`<p>Deployment checklist: (1) push code to GitHub (public repo), (2) go to share.streamlit.io, (3) connect your GitHub account, (4) select repo and main file, (5) add secrets (API keys) in the Streamlit Cloud dashboard — never hardcode them in code.</p><p>A good README has: project title, 1-sentence description, demo GIF or screenshot, features list, how to run locally, tech stack, and what you learned. This is the first thing recruiters and interviewers see.</p>`,code:`# streamlit_app.py — production-ready structure\n\nimport streamlit as st\nimport os\n\n# Handle API keys for both local and cloud\nAPI_KEY = st.secrets.get("GEMINI_API_KEY") or os.getenv("GEMINI_API_KEY")\n\nif not API_KEY:\n    st.error("API key not found. Add GEMINI_API_KEY to Streamlit secrets.")\n    st.stop()\n\n# requirements.txt — must include ALL dependencies:\n# streamlit>=1.28.0\n# pandas>=2.0.0\n# scikit-learn>=1.3.0\n# xgboost>=2.0.0\n# google-generativeai>=0.3.0\n# joblib>=1.3.0\n\n# .streamlit/config.toml — optional UI customisation:\n# [theme]\n# primaryColor = "#7C3AED"\n# backgroundColor = "#0F172A"\n# textColor = "#E2E8F0"`,resources:[{title:"Deploy Streamlit App to Cloud",url:"https://www.youtube.com/results?search_query=deploy+Streamlit+app+cloud+free+GitHub+tutorial"},{title:"Write a Great README",url:"https://www.youtube.com/results?search_query=how+to+write+great+README+GitHub+tutorial"}],exercise:"Deploy your app to Streamlit Cloud. Write a complete README with a screenshot. Share the public URL in your project submission. Verify the app works for someone without your API key (use st.secrets).",keyTerms:["Streamlit Cloud","requirements.txt","st.secrets","README","deployment","GitHub"]},
{day:39,mod:4,title:"Final Review & Presentation Prep",objectives:["Complete final code review","Prepare project presentation structure","Rehearse technical demo"],content:`<p>Before presenting, run through this checklist: (1) app loads without errors, (2) all features work end-to-end, (3) handles invalid input gracefully, (4) model accuracy documented with test metrics, (5) README complete, (6) code is commented and readable.</p><p>Structure your presentation: <strong>Problem</strong> (1 slide: what problem, who has it, why it matters), <strong>Approach</strong> (1 slide: data + model choice + why), <strong>Results</strong> (1 slide: key metrics + what improved over baseline), <strong>Demo</strong> (3 minutes live demo), <strong>Learnings</strong> (1 slide: what surprised you, what you'd do differently).</p>`,code:`# Final checklist script — run before presentation\nimport joblib, pandas as pd\nfrom sklearn.metrics import classification_report\n\n# 1. Load model and verify it works\nmodel = joblib.load("model.pkl")\n\n# 2. Test with known examples\ntest_cases = [\n    # (input, expected_output)\n    ([25, 50000, 1], "positive"),\n    ([60, 20000, 0], "negative"),\n]\nfor inputs, expected in test_cases:\n    pred = model.predict([inputs])[0]\n    status = "✅" if str(pred)==expected else "❌"\n    print(f"{status} Input {inputs}: got '{pred}', expected '{expected}'")\n\n# 3. Performance on held-out test set\nprint("\\nFinal Test Metrics:")\nprint(classification_report(y_test, model.predict(X_test)))`,resources:[{title:"Technical Project Presentation Tips",url:"https://www.youtube.com/results?search_query=technical+project+presentation+tips+data+science"},{title:"Data Science Demo Best Practices",url:"https://www.youtube.com/results?search_query=data+science+demo+presentation+best+practices"}],exercise:"Run the checklist above. Fix any failing tests. Write your 5-slide presentation outline. Do one full run-through of your demo — time it (target: 3–4 minutes for demo).",keyTerms:["code review","checklist","presentation","demo script","test cases","final metrics"]},
{day:40,mod:4,title:"Presentation Day Prep",objectives:["Deliver a compelling technical presentation","Handle questions confidently","Celebrate 45 days of learning"],content:`<p>Today you present your project to the group. Remember: you built this from scratch in 45 days. You know it better than anyone in the room. Be proud of what you've created.</p><p>Presentation tips: (1) start with the problem, not the technology, (2) show your demo before explaining the code, (3) quote your numbers precisely ("83.4% F1 score" not "pretty good"), (4) when you get a question you don't know — "That's a great question. My hypothesis would be X, but I'd need to test it." That's the honest, professional answer.</p>`,code:`# You've built:\n# ✅ A complete ML pipeline (data → model → evaluation)\n# ✅ An AI-integrated application \n# ✅ A deployed Streamlit app\n# ✅ A documented GitHub repository\n\n# Today's agenda:\n# 1. 5-minute presentation per student\n# 2. 2-minute Q&A per student\n# 3. Peer voting: Most Creative, Most Impactful, Best Code\n\n# After today, your next steps:\nprint("Next Steps:")\nprint("1. Enter a Kaggle competition")\nprint("2. Build Track 3 (Advanced AI & Agents)")\nprint("3. Contribute to an open source ML project")\nprint("4. Add this project to your portfolio/LinkedIn")\nprint("5. Keep building — 45 days is just the beginning!")`,resources:[{title:"How to Present Data Science Projects",url:"https://www.youtube.com/results?search_query=how+to+present+data+science+project+interview+tips"},{title:"Kaggle Getting Started",url:"https://www.youtube.com/results?search_query=Kaggle+getting+started+competitions+beginners"}],exercise:"Present your project! After presentations: write a 1-page reflection — what you learned, what was hardest, what you're most proud of, and one thing you'd add if you had more time.",keyTerms:["presentation","demo","reflection","portfolio","next steps","Kaggle"]},
{day:41,mod:4,title:"Peer Review & Feedback",objectives:["Give constructive technical feedback","Receive and act on feedback","Document learnings and improvements"],content:`<p>Peer review is one of the most valuable learning tools in software development. Reviewing others' code forces you to think about different approaches — you'll learn techniques you never would have discovered alone.</p><p>Feedback framework: <strong>2 specific positives</strong> ("The feature engineering for X was creative because..."), <strong>1 specific improvement</strong> ("Consider adding error handling for empty CSV uploads — here's how..."). Specific > vague. "Great job" is not feedback. "The model explanation in the README helped me understand your approach immediately" is feedback.</p>`,code:`# Peer review checklist\nreview_template = {\n    "project_name": "",\n    "reviewer": "",\n    "positives": [\n        "1. Specific thing that worked well and why",\n        "2. Another specific positive"\n    ],\n    "improvement": "One specific, actionable suggestion with example",\n    "questions": [\n        "What would happen if you tried X?",\n        "How did you decide on Y approach?"\n    ],\n    "rating": {\n        "code_quality": "1-5",\n        "problem_framing": "1-5",\n        "model_performance": "1-5",\n        "presentation_clarity": "1-5"\n    }\n}`,resources:[{title:"How to Give Technical Feedback",url:"https://www.youtube.com/results?search_query=how+to+give+technical+code+review+feedback"},{title:"Code Review Best Practices",url:"https://www.youtube.com/results?search_query=code+review+best+practices+software+engineering"}],exercise:"Review 2 classmates' projects using the template above. Then implement the best piece of feedback you received on your own project. Commit the improvement to GitHub.",keyTerms:["peer review","feedback","code quality","iteration","improvement","collaboration"]},
{day:42,mod:4,title:"Graduation & What's Next",objectives:["Celebrate completing 45 days","Map your personal path forward","Set one concrete next action"],content:`<p>You've completed Track 2: ML & AI Tools Mastery. In 45 days, you've gone from Python basics to building and deploying production AI applications. That's genuinely impressive — most people never get past the notebook stage.</p><p>What you've built: a complete data science skillset (EDA, feature engineering, 10+ ML algorithms, deployment), experience with state-of-the-art AI APIs (Gemini, OpenAI, LangChain), and a live app you can show anyone. This is your foundation.</p>`,code:`# 🎓 You've mastered:\ntrack_2_skills = {\n    "Data Science": ["NumPy","Pandas","Matplotlib","Seaborn","EDA","Feature Engineering"],\n    "Machine Learning": ["Linear Regression","Logistic Regression","Random Forest",\n                        "XGBoost","SVM","KNN","Naive Bayes","Neural Nets","CNNs"],\n    "AI Tools": ["Gemini API","OpenAI API","LangChain","ChromaDB","RAG","Streamlit"],\n    "Production": ["Model Deployment","Flask API","Streamlit Cloud","GitHub"]\n}\n\nfor domain, skills in track_2_skills.items():\n    print(f"\\n{domain}:")\n    for s in skills: print(f"  ✅ {s}")\n\nprint("\\n🚀 Next: Track 3 — Advanced AI & Agent Engineering")\nprint("   Or: kaggle.com → join a competition this week")`,resources:[{title:"Machine Learning Career Roadmap 2024",url:"https://www.youtube.com/results?search_query=machine+learning+career+roadmap+2024+data+scientist"},{title:"Kaggle Competitions for Beginners",url:"https://www.youtube.com/results?search_query=kaggle+competition+beginners+how+to+start"}],exercise:"Set ONE concrete next action with a date: 'By [date], I will [specific action].' Examples: enter a Kaggle competition, build Track 3, apply to a data science internship, or build one new project with what you've learned.",keyTerms:["graduation","portfolio","Kaggle","career","Track 3","next steps"]}

// ─── RENDERER ───────────────────────────────────────────────────────────────
let currentDay = null;

function init() {
  renderSidebar();
  updateProgress();
  showOverview();
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  modules.forEach(mod => {
    const header = document.createElement('div');
    header.className = 'module-header';
    header.textContent = `Module ${mod.id}: ${mod.title}`;
    sidebar.appendChild(header);
    for (let d = mod.days[0]; d <= mod.days[1]; d++) {
      const lesson = lessons.find(l => l.day === d);
      if (!lesson) continue;
      const item = document.createElement('div');
      item.className = 'day-item' + (completed.includes(d) ? ' done' : '') + (currentDay === d ? ' active' : '');
      item.innerHTML = `<div class="check">${completed.includes(d) ? '✓' : ''}</div><span class="day-num">Day ${d}</span><span>${lesson.title}</span>`;
      item.onclick = () => loadDay(d);
      sidebar.appendChild(item);
    }
  });
}

function updateProgress() {
  const pct = (completed.length / 45) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completed.length} / 45`;
}

function showOverview() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <h2 style="margin-bottom:.5rem;font-size:1.5rem">ML & AI Tools Mastery</h2>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:1.5rem">For Intermediate / 12th Completed Students · 45 Days · Intermediate Level</p>
    <div class="overview">
      ${modules.map(m => `<div class="overview-card"><h3>Module ${m.id}: ${m.title}</h3><p>Days ${m.days[0]}–${m.days[1]}</p></div>`).join('')}
    </div>
    <p style="color:var(--muted);font-size:.83rem;margin-top:1.5rem">← Select a day from the sidebar to begin</p>`;
  currentDay = null;
  renderSidebar();
}

function loadDay(dayNum) {
  currentDay = dayNum;
  const lesson = lessons.find(l => l.day === dayNum);
  if (!lesson) return;
  renderSidebar();
  const isDone = completed.includes(dayNum);
  const main = document.getElementById('main');
  main.innerHTML = `<div class="lesson active">
    <div class="lesson-header">
      <div class="day-badge">Day ${lesson.day}</div>
      <div>
        <div class="lesson-title">${lesson.title}</div>
        <div class="module-tag">Module ${lesson.mod}: ${lesson.moduleTitle}</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Learning Objectives</div>
      <ul class="objectives">${lesson.objectives.map(o=>`<li>${o}</li>`).join('')}</ul>
    </div>
    <div class="section">
      <div class="section-title">Lesson Content</div>
      <div class="content-text">${lesson.content}</div>
    </div>
    ${lesson.code ? `<div class="section">
      <div class="section-title">Code Example</div>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">python</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
        <pre>${escHtml(lesson.code)}</pre>
      </div>
    </div>` : ''}
    <div class="section">
      <div class="section-title">Resources</div>
      <div class="resources">${lesson.resources.map(r=>`<a href="${r.url}" target="_blank" class="resource-card"><span class="resource-icon">▶</span>${r.title}</a>`).join('')}</div>
    </div>
    <div class="section">
      <div class="section-title">Today's Exercise</div>
      <div class="exercise-box"><p>${lesson.exercise}</p></div>
    </div>
    ${lesson.keyTerms ? `<div class="section">
      <div class="section-title">Key Terms</div>
      <div class="terms">${lesson.keyTerms.map(t=>`<span class="term">${t}</span>`).join('')}</div>
    </div>` : ''}
    <div class="lesson-nav">
      <button class="nav-btn" onclick="loadDay(${dayNum-1})" ${dayNum<=1?'disabled':''}>← Day ${dayNum-1}</button>
      <button class="complete-btn ${isDone?'done':''}" onclick="markComplete(${dayNum})">${isDone?'✓ Completed':'Mark Complete'}</button>
      <button class="nav-btn" onclick="loadDay(${dayNum+1})" ${dayNum>=45?'disabled':''}>Day ${dayNum+1} →</button>
    </div>
  </div>`;
  main.scrollTop = 0;
}

function markComplete(dayNum) {
  if (!completed.includes(dayNum)) {
    completed.push(dayNum);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(completed));
    updateProgress();
    loadDay(dayNum);
    renderSidebar();
  }
}

function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
