{day:35,mod:4,title:"Capstone — Day 2: Score Predictor Model",objectives:["Build a Linear Regression model that predicts exam scores from study hours","Integrate the model into your Streamlit app","Show the prediction on screen with a slider input"],content:`<p><strong>In one line:</strong> Today you add the ML component — a score predictor that takes study hours as input and predicts exam score as output.</p><p>Use a simple Linear Regression model. Create synthetic training data (study hours vs marks) to start — you can replace it with real data later. The key is getting the prediction to show up in your Streamlit app.</p><p>Keep it to one input slider today. Do not add more features yet — make the basic version work first, then improve it tomorrow.</p>`,code:`# Study score predictor in Streamlit\nimport streamlit as st\nimport numpy as np\nfrom sklearn.linear_model import LinearRegression\n\n# Train a simple model on synthetic data\nhours = np.array([1,2,3,4,5,6,7,8]).reshape(-1,1)\nscores = np.array([35,45,55,62,70,78,85,90])\nmodel = LinearRegression().fit(hours, scores)\n\nst.title("Smart Student Helper")\nst.subheader("Exam Score Predictor")\n\nstudy_hours = st.slider("Study hours per day", 1, 10, 4)\npred = model.predict([[study_hours]])[0]\nst.metric("Predicted exam score", f"{pred:.0f} / 100")`,resources:[{title:"Streamlit Tutorial",url:"https://www.youtube.com/results?search_query=streamlit+tutorial+python+beginners+2024"},{title:"Linear Regression scikit-learn",url:"https://www.youtube.com/results?search_query=linear+regression+scikit-learn+tutorial"}],exercise:"Get the Streamlit app above running on your machine with 'streamlit run app.py'. Move the slider and confirm the score changes. Screenshot the working app.",keyTerms:["Streamlit","Linear Regression","slider","metric","predict"]},
{day:36,mod:4,title:"Capstone — Day 3: AI Topic Summariser",objectives:["Add a text input and Gemini API call to your Streamlit app","Display the AI-generated summary on screen","Handle empty input gracefully with an error message"],content:`<p><strong>In one line:</strong> Today you add the AI part — a subject + topic input that calls Gemini and shows a 5-point summary directly in your Streamlit app.</p><p>Use <code>st.text_input()</code> for the subject and topic, a button to trigger the API call, and <code>st.write()</code> to show the result. Wrap the API call in a try/except so the app does not crash if the API fails.</p><p>This is the most impressive part of the app — make sure it works cleanly before moving to the next day.</p>`,code:`# Add AI summariser to your Streamlit app\nimport streamlit as st\nimport google.generativeai as genai\n\ngenai.configure(api_key="YOUR_API_KEY")\nmodel = genai.GenerativeModel('gemini-1.5-flash')\n\nst.subheader("AI Study Summariser")\nsubject = st.text_input("Subject (e.g., Physics)")\ntopic   = st.text_input("Topic (e.g., Newton's Laws)")\n\nif st.button("Summarise"):\n    if subject and topic:\n        with st.spinner("Asking Gemini..."):\n            prompt = f"Summarise {topic} in {subject} in 5 bullet points for a Class 12 student."\n            response = model.generate_content(prompt)\n            st.write(response.text)\n    else:\n        st.error("Please enter both subject and topic.")`,resources:[{title:"Streamlit + Gemini API Tutorial",url:"https://www.youtube.com/results?search_query=streamlit+gemini+api+python+tutorial+2024"},{title:"Streamlit Input Widgets",url:"https://www.youtube.com/results?search_query=streamlit+text+input+button+widgets+tutorial"}],exercise:"Add the AI summariser section to your app.py. Test it with 3 different subjects and topics. Screenshot each successful output. Does the error message show when you leave a field blank?",keyTerms:["text_input","st.button","st.spinner","Gemini API","error handling"]},
{day:37,mod:4,title:"Capstone — Day 4: Combine Both Features",objectives:["Put the score predictor and AI summariser in separate tabs","Add a simple About section","Make the whole app run without errors from top to bottom"],content:`<p><strong>In one line:</strong> Today you combine the score predictor and the AI summariser into one clean app using Streamlit tabs.</p><p>Use <code>st.tabs()</code> to separate the two features. Tab 1 is the score predictor (slider + metric). Tab 2 is the AI summariser (text inputs + Gemini call). Tab 3 is a short About section explaining what the app does.</p><p>Before moving to deployment, make sure the app runs completely without errors from top to bottom. Ask a classmate to test it and report any crashes.</p>`,code:`# Complete app with tabs\nimport streamlit as st\nimport numpy as np\nfrom sklearn.linear_model import LinearRegression\nimport google.generativeai as genai\n\ngenai.configure(api_key="YOUR_API_KEY")\nmodel_ai = genai.GenerativeModel('gemini-1.5-flash')\nhours = np.array([1,2,3,4,5,6,7,8]).reshape(-1,1)\nscores = np.array([35,45,55,62,70,78,85,90])\nmodel_ml = LinearRegression().fit(hours, scores)\n\nst.title("Smart Student Helper")\ntab1, tab2, tab3 = st.tabs(["Score Predictor", "AI Summariser", "About"])\n\nwith tab1:\n    h = st.slider("Study hours per day", 1, 10, 4)\n    st.metric("Predicted Score", f"{model_ml.predict([[h]])[0]:.0f} / 100")\n\nwith tab2:\n    subj = st.text_input("Subject")\n    topic = st.text_input("Topic")\n    if st.button("Summarise") and subj and topic:\n        st.write(model_ai.generate_content(f"Summarise {topic} in {subj} in 5 bullets for Class 12.").text)\n\nwith tab3:\n    st.write("Built by [your name] — NexGen AI Course 2025.")`,resources:[{title:"Streamlit Tabs Tutorial",url:"https://www.youtube.com/results?search_query=streamlit+tabs+layout+tutorial+python"},{title:"Streamlit Complete App Tutorial",url:"https://www.youtube.com/results?search_query=streamlit+complete+app+tutorial+2024"}],exercise:"Run your full 3-tab app. Share the screen with a classmate and ask them to use both features. Fix any error they encounter. Goal: zero crashes.",keyTerms:["st.tabs","Streamlit","cache_resource","error handling","app layout"]},
{day:38,mod:4,title:"Capstone — Day 5: Deploy to Streamlit Cloud",objectives:["Push your app to a public GitHub repo","Deploy to Streamlit Cloud in 5 steps","Add your API key securely using st.secrets"],content:`<p><strong>In one line:</strong> Today you deploy your app so anyone in the world can use it from a browser link — no installation needed.</p><p>Steps: (1) push your code to a public GitHub repo, (2) go to share.streamlit.io and sign in with GitHub, (3) select your repo and app.py, (4) add your API key as a secret (not in the code), (5) deploy. Takes about 5 minutes.</p><p>Never put your API key inside app.py before pushing to GitHub. Use <code>st.secrets["GEMINI_API_KEY"]</code> in your code and add the actual key in the Streamlit Cloud dashboard under "Secrets".</p>`,code:`# How to read your API key securely on Streamlit Cloud\nimport streamlit as st\nimport google.generativeai as genai\n\n# Read from Streamlit Secrets (set in cloud dashboard — not in your code)\nAPI_KEY = st.secrets["GEMINI_API_KEY"]\ngenai.configure(api_key=API_KEY)\n\n# requirements.txt must list all packages you import:\n# streamlit\n# google-generativeai\n# scikit-learn\n# numpy`,resources:[{title:"Deploy Streamlit App Free",url:"https://www.youtube.com/results?search_query=deploy+streamlit+app+cloud+free+github+2024"},{title:"Streamlit Secrets Management",url:"https://www.youtube.com/results?search_query=streamlit+secrets+api+key+deployment+tutorial"}],exercise:"Deploy your app to Streamlit Cloud. Share the public URL with your instructor. Test that it works on your phone's browser (mobile view).",keyTerms:["Streamlit Cloud","GitHub","st.secrets","requirements.txt","deployment"]},
{day:39,mod:4,title:"Capstone — Day 6: Presentation Prep",objectives:["Verify your app works end-to-end without errors","Prepare a 3-minute verbal walkthrough of your app","Practice explaining what each part of the app does"],content:`<p><strong>In one line:</strong> Today you prepare to present your app — not the code, but the story behind it: what problem it solves and how it works.</p><p>Structure your 3 minutes: (1) 30 seconds — "This app helps students..." (2) 1 minute — live demo of both features, (3) 1 minute — "I built this using Linear Regression for... and Gemini API for..." (4) 30 seconds — "What I learned was...".</p><p>When you get a question you cannot answer, say: "That's a good question. My best guess is X, but I'd need to test it to be sure." That is an honest, professional answer.</p>`,code:`# Pre-presentation checklist\nprint("Checking your app before presentation...")\nchecks = [\n    "App loads without errors",\n    "Score predictor works with any slider value",\n    "AI summariser works for any subject/topic",\n    "Error message shows for empty input",\n    "Deployed URL is working on phone",\n]\nfor c in checks:\n    print(f"  [ ] {c}")`,resources:[{title:"How to Present a Data Science Project",url:"https://www.youtube.com/results?search_query=how+to+present+data+science+project+beginner"},{title:"Demo Best Practices",url:"https://www.youtube.com/results?search_query=technical+demo+presentation+tips"}],exercise:"Do one full rehearsal of your 3-minute presentation out loud. Time yourself. Fix anything that breaks or feels unclear. Then ask one classmate to watch and give one piece of feedback.",keyTerms:["presentation","demo","checklist","explanation","rehearsal"]},
{day:40,mod:4,title:"Presentation Day",objectives:["Present your project in 3 minutes","Answer 2 questions from the class or instructor","Celebrate completing the capstone"],content:`<p><strong>In one line:</strong> Today you present your Smart Student Helper app to the group — you built it from scratch, and you know it better than anyone in the room.</p><p>Start with the problem, not the technology. "This app helps students who spend hours summarising textbook chapters" is more compelling than "This app uses the Gemini API".</p><p>After presentations, vote for: Most Useful App, Most Creative Idea, and Best Demo. These are recognition, not competition.</p>`,code:`# What you built in 45 days:\nskills_gained = {\n    "Data Science": ["NumPy", "Pandas", "Seaborn", "EDA", "Feature Engineering"],\n    "Machine Learning": ["Linear Regression", "Random Forest", "XGBoost", "Neural Nets"],\n    "AI Tools": ["Gemini API", "Prompt Engineering", "LLM concepts"],\n    "Production": ["Streamlit", "Streamlit Cloud", "GitHub"]\n}\nfor domain, skills in skills_gained.items():\n    print(f"{domain}: {', '.join(skills)}")`,resources:[{title:"How to Present Data Science Projects",url:"https://www.youtube.com/results?search_query=how+to+present+data+science+project+interview+tips"},{title:"Kaggle Getting Started",url:"https://www.youtube.com/results?search_query=Kaggle+getting+started+competitions+beginners"}],exercise:"After your presentation: write 3 sentences — what you are most proud of, what was hardest, and one thing you would add to the app next.",keyTerms:["presentation","demo","portfolio","reflection","capstone"]},
{day:41,mod:4,title:"Peer Review & Feedback",objectives:["Give one specific piece of helpful feedback to a classmate","Receive feedback and implement one improvement","Learn one technique from another student's approach"],content:`<p><strong>In one line:</strong> Peer review means looking at your classmate's work carefully enough to say something specific and helpful — not just "good job".</p><p>Use this formula: "I noticed X works really well because Y. One thing to try would be Z." This is specific, honest, and actionable — the three qualities of good feedback.</p><p>When you receive feedback, say "thank you" first, then decide whether to act on it. You don't have to accept every suggestion, but you should consider each one seriously.</p>`,code:`# Peer review guide — use this in your notes\nreview = {\n    "project": "Ravi's Smart Helper",\n    "one_positive": "The slider for study hours is easy to understand.",\n    "one_suggestion": "Try showing the confidence level next to the predicted score.",\n    "one_question": "How did you decide to use Linear Regression instead of Random Forest?"\n}\nfor k, v in review.items():\n    print(f"{k}: {v}")`,resources:[{title:"How to Give Technical Feedback",url:"https://www.youtube.com/results?search_query=how+to+give+technical+code+review+feedback"},{title:"Code Review Best Practices",url:"https://www.youtube.com/results?search_query=code+review+best+practices+software+engineering"}],exercise:"Review one classmate's project. Write one specific positive and one specific suggestion (2–3 sentences each). Then implement the best piece of feedback you received on your own app.",keyTerms:["peer review","feedback","improvement","collaboration","iteration"]},
{day:42,mod:4,title:"Graduation & What's Next",objectives:["Recognise what you accomplished in this course","Add your project to your LinkedIn or portfolio","Set one concrete next step with a date"],content:`<p><strong>In one line:</strong> You completed Track 2 — you went from loading a CSV to deploying a live AI-powered web app, and that is something most people never do.</p><p>What you built is real: a working Streamlit app using ML and AI, deployed online. You can show it to anyone on your phone right now. Add the GitHub link to your LinkedIn profile today.</p><p>Your next step: pick ONE thing and set a date. "By May 30, I will enter one Kaggle competition" is better than five vague goals. One concrete action beats ten intentions.</p>`,code:`# What you learned in 42 days\nskills = [\n    "NumPy, Pandas, Seaborn — data wrangling and visualisation",\n    "Linear Regression, Random Forest, XGBoost — ML algorithms",\n    "Logistic Regression, KNN, Naive Bayes — classification",\n    "Gemini API, OpenAI API — building with LLMs",\n    "Streamlit, Streamlit Cloud — deploying real apps",\n]\nprint("Track 2 Complete. You now know:")\nfor s in skills:\n    print(f"  - {s}")\nprint("\\nNext: Track 3 or your first Kaggle competition.")`,resources:[{title:"Machine Learning Career Roadmap 2024",url:"https://www.youtube.com/results?search_query=machine+learning+career+roadmap+2024+data+scientist"},{title:"Kaggle Competitions for Beginners",url:"https://www.youtube.com/results?search_query=kaggle+competition+beginners+how+to+start"}],exercise:"Write your one concrete next action: 'By [specific date], I will [specific action].' Share it with your instructor or a classmate who will hold you accountable.",keyTerms:["graduation","portfolio","Kaggle","LinkedIn","next steps"]}

// ─── RENDERER ───────────────────────────────────────────────────────────────
let currentDay = null;

function init() {
  renderSidebar();
  updateProgress();
  showOverview();
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  modules.forEach(mod => {
    const header = document.createElement('div');
    header.className = 'module-header';
    header.textContent = `Module ${mod.id}: ${mod.title}`;
    sidebar.appendChild(header);
    for (let d = mod.days[0]; d <= mod.days[1]; d++) {
      const lesson = lessons.find(l => l.day === d);
      if (!lesson) continue;
      const item = document.createElement('div');
      item.className = 'day-item' + (completed.includes(d) ? ' done' : '') + (currentDay === d ? ' active' : '');
      item.innerHTML = `<div class="check">${completed.includes(d) ? '✓' : ''}</div><span class="day-num">Day ${d}</span><span>${lesson.title}</span>`;
      item.onclick = () => loadDay(d);
      sidebar.appendChild(item);
    }
  });
}

function updateProgress() {
  const pct = (completed.length / 45) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completed.length} / 45`;
}

function showOverview() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <h2 style="margin-bottom:.5rem;font-size:1.5rem">ML & AI Tools Mastery</h2>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:1.5rem">For Intermediate / 12th Completed Students · 45 Days · Intermediate Level</p>
    <div class="overview">
      ${modules.map(m => `<div class="overview-card"><h3>Module ${m.id}: ${m.title}</h3><p>Days ${m.days[0]}–${m.days[1]}</p></div>`).join('')}
    </div>
    <p style="color:var(--muted);font-size:.83rem;margin-top:1.5rem">← Select a day from the sidebar to begin</p>`;
  currentDay = null;
  renderSidebar();
}

function loadDay(dayNum) {
  currentDay = dayNum;
  const lesson = lessons.find(l => l.day === dayNum);
  if (!lesson) return;
  renderSidebar();
  const isDone = completed.includes(dayNum);
  const main = document.getElementById('main');
  main.innerHTML = `<div class="lesson active">
    <div class="lesson-header">
      <div class="day-badge">Day ${lesson.day}</div>
      <div>
        <div class="lesson-title">${lesson.title}</div>
        <div class="module-tag">Module ${lesson.mod}: ${lesson.moduleTitle}</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Learning Objectives</div>
      <ul class="objectives">${lesson.objectives.map(o=>`<li>${o}</li>`).join('')}</ul>
    </div>
    <div class="section">
      <div class="section-title">Lesson Content</div>
      <div class="content-text">${lesson.content}</div>
    </div>
    ${lesson.code ? `<div class="section">
      <div class="section-title">Code Example</div>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">python</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
        <pre>${escHtml(lesson.code)}</pre>
      </div>
    </div>` : ''}
    <div class="section">
      <div class="section-title">Resources</div>
      <div class="resources">${lesson.resources.map(r=>`<a href="${r.url}" target="_blank" class="resource-card"><span class="resource-icon">▶</span>${r.title}</a>`).join('')}</div>
    </div>
    <div class="section">
      <div class="section-title">Today's Exercise</div>
      <div class="exercise-box"><p>${lesson.exercise}</p></div>
    </div>
    ${lesson.keyTerms ? `<div class="section">
      <div class="section-title">Key Terms</div>
      <div class="terms">${lesson.keyTerms.map(t=>`<span class="term">${t}</span>`).join('')}</div>
    </div>` : ''}
    <div class="lesson-nav">
      <button class="nav-btn" onclick="loadDay(${dayNum-1})" ${dayNum<=1?'disabled':''}>← Day ${dayNum-1}</button>
      <button class="complete-btn ${isDone?'done':''}" onclick="markComplete(${dayNum})">${isDone?'✓ Completed':'Mark Complete'}</button>
      <button class="nav-btn" onclick="loadDay(${dayNum+1})" ${dayNum>=45?'disabled':''}>Day ${dayNum+1} →</button>
    </div>
  </div>`;
  main.scrollTop = 0;
}

function markComplete(dayNum) {
  if (!completed.includes(dayNum)) {
    completed.push(dayNum);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(completed));
    updateProgress();
    loadDay(dayNum);
    renderSidebar();
  }
}

function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
