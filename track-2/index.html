<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#7C3AED;--accent:#F59E0B;--bg:#0F172A;--card:#1E293B;--text:#E2E8F0;--muted:#94A3B8;--success:#10B981;--border:#334155}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
a{color:var(--accent);text-decoration:none}
/* NAV */
nav{background:#1E293B;border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;gap:1rem;flex-shrink:0;z-index:10}
.nav-logo{font-weight:700;font-size:1.1rem;color:#fff;letter-spacing:-.5px}
.nav-logo span{color:var(--primary)}
.nav-track{background:var(--primary);color:#fff;padding:.25rem .75rem;border-radius:20px;font-size:.75rem;font-weight:600}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:1rem}
.progress-wrap{display:flex;align-items:center;gap:.5rem}
.progress-bar{width:140px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .4s ease}
.progress-text{font-size:.75rem;color:var(--muted);white-space:nowrap}
.nav-home{font-size:.8rem;color:var(--muted);padding:.3rem .7rem;border:1px solid var(--border);border-radius:6px;transition:.2s}
.nav-home:hover{color:var(--text);border-color:var(--primary)}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
.sidebar{width:260px;background:#0B1628;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:.5rem 0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.module-header{padding:.6rem 1rem .3rem;font-size:.65rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1px}
.day-item{display:flex;align-items:center;gap:.6rem;padding:.45rem 1rem;cursor:pointer;transition:.15s;border-left:3px solid transparent;font-size:.8rem;color:var(--muted)}
.day-item:hover{background:#1E293B;color:var(--text)}
.day-item.active{background:#1E2A3A;color:var(--text);border-left-color:var(--primary)}
.day-item.done .check{background:var(--success);border-color:var(--success);color:#fff}
.day-item .day-num{font-size:.65rem;font-weight:600;color:var(--muted);min-width:28px}
.day-item.active .day-num{color:var(--primary)}
.check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.55rem}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:2rem}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* OVERVIEW */
.overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.overview-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;border-top:3px solid var(--primary)}
.overview-card h3{font-size:.85rem;font-weight:600;margin-bottom:.25rem}
.overview-card p{font-size:.75rem;color:var(--muted)}
/* LESSON */
.lesson{display:none;max-width:860px}
.lesson.active{display:block}
.lesson-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.day-badge{background:linear-gradient(135deg,var(--primary),#9333EA);color:#fff;padding:.4rem .9rem;border-radius:8px;font-weight:700;font-size:.85rem;white-space:nowrap}
.lesson-title{font-size:1.4rem;font-weight:700}
.module-tag{font-size:.7rem;color:var(--muted);background:var(--card);padding:.2rem .6rem;border-radius:4px;border:1px solid var(--border)}
/* SECTIONS */
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:.75rem}
.objectives{list-style:none;display:flex;flex-direction:column;gap:.4rem}
.objectives li{display:flex;align-items:flex-start;gap:.5rem;font-size:.85rem;color:var(--muted)}
.objectives li::before{content:"→";color:var(--primary);flex-shrink:0;margin-top:.05rem}
.content-text p{font-size:.88rem;line-height:1.7;color:#CBD5E1;margin-bottom:.75rem}
.content-text p:last-child{margin-bottom:0}
/* CODE */
.code-block{background:#0D1117;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.code-header{display:flex;justify-content:space-between;align-items:center;padding:.5rem .75rem;background:#161B22;border-bottom:1px solid var(--border)}
.code-lang{font-size:.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.copy-btn{font-size:.7rem;color:var(--muted);background:none;border:1px solid var(--border);padding:.2rem .5rem;border-radius:4px;cursor:pointer;font-family:inherit;transition:.15s}
.copy-btn:hover{color:var(--text);border-color:var(--accent)}
pre{padding:1rem;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.6;color:#E6EDF3}
/* RESOURCES */
.resources{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.6rem}
.resource-card{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;background:#0F172A;border:1px solid var(--border);border-radius:8px;font-size:.78rem;color:var(--muted);transition:.2s;cursor:pointer}
.resource-card:hover{border-color:var(--primary);color:var(--text)}
.resource-icon{font-size:1rem;flex-shrink:0}
/* EXERCISE */
.exercise-box{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(245,158,11,.05));border:1px solid rgba(124,58,237,.3);border-radius:10px;padding:1rem 1.25rem}
.exercise-box p{font-size:.87rem;line-height:1.6;color:#CBD5E1}
/* KEY TERMS */
.terms{display:flex;flex-wrap:wrap;gap:.4rem}
.term{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:#A78BFA;padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-family:'JetBrains Mono',monospace}
/* NAV BUTTONS */
.lesson-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.nav-btn{padding:.6rem 1.2rem;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;border:1px solid var(--border);background:var(--card);color:var(--muted)}
.nav-btn:hover:not(:disabled){border-color:var(--primary);color:var(--text)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.complete-btn{padding:.6rem 1.4rem;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;border:none;background:var(--primary);color:#fff;transition:.2s}
.complete-btn:hover{background:#6D28D9}
.complete-btn.done{background:var(--success)}
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:1rem}
  .overview{grid-template-columns:1fr}
}
</style>

<script>
const STORAGE_KEY = 'nexgen_track2_progress';
let completed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

const modules = [
  { id:1, title:'Python for Data Science', days:[1,10] },
  { id:2, title:'Machine Learning', days:[11,24] },
  { id:3, title:'Prompt Engineering & AI Tools', days:[25,33] },
  { id:4, title:'Capstone Project', days:[34,45] }
];

const lessons = [
// LESSONS_START
{day:1,mod:1,title:"Data Science Setup & Python Review",objectives:["Set up Google Colab for data science","Import and verify all key libraries","Understand the data science workflow"],content:`<p><strong>In one line:</strong> Google Colab is your free online lab where all data science tools are already installed — open a browser and start coding.</p><p>The data science workflow follows a pattern you'll use on every project: <strong>Collect → Clean → Explore → Model → Visualise → Communicate</strong>. Today just focus on getting your environment working.</p><p>If you can write a list comprehension and a function, you're ready for this course. If not, revisit Day 1 of Track 1 before continuing.</p>`,code:`# Check your Colab environment is ready\nimport numpy as np\nimport pandas as pd\nimport matplotlib.pyplot as plt\nfrom sklearn.model_selection import train_test_split\n\nprint(f"NumPy: {np.__version__}")\nprint(f"Pandas: {pd.__version__}")\nprint("Environment ready!")`,resources:[{title:"Google Colab for Data Science",url:"https://www.youtube.com/results?search_query=Google+Colab+data+science+tutorial+beginners"},{title:"Python Data Science Handbook (free)",url:"https://www.youtube.com/results?search_query=Python+data+science+full+course+freeCodeCamp"}],exercise:"Open a new Colab notebook. Import NumPy, Pandas, and Matplotlib. Print their versions. If everything prints without errors, you're ready for Day 2.",keyTerms:["Google Colab","NumPy","Pandas","Matplotlib","scikit-learn"]},
{day:2,mod:1,title:"NumPy — Arrays & Broadcasting",objectives:["Understand NumPy arrays and why they are faster than Python lists","Use broadcasting to do math without loops","Apply basic matrix operations"],content:`<p><strong>In one line:</strong> NumPy arrays are like supercharged Python lists — they run math operations on the whole array at once instead of one item at a time.</p><p>Think of a cricket scorecard — instead of adding each player's score one by one, NumPy lets you add 50 to all scores in one line. This speed is why every ML library uses NumPy under the hood.</p><p>Matrix multiplication is important: every neural network layer is just a matrix multiply plus an activation. Build the habit of thinking in arrays, not loops.</p>`,code:`# NumPy arrays vs Python lists — speed and convenience\nimport numpy as np\n\n# JEE scores for 7 students\nscores = np.array([78, 85, 92, 67, 88, 95, 73])\nprint(f"Class avg: {scores.mean():.1f}")\nprint(f"Top score: {scores.max()}")\n\n# Broadcasting — add 5 bonus marks to everyone\nbonused = scores + 5\nprint(f"After bonus: {bonused}")\n\n# Matrix multiply (used in every neural network)\nA = np.array([[1,2],[3,4]])\nB = np.array([[5,6],[7,8]])\nprint(np.dot(A, B))`,resources:[{title:"NumPy Crash Course – Keith Galli",url:"https://www.youtube.com/results?search_query=NumPy+crash+course+Keith+Galli"},{title:"NumPy for Machine Learning",url:"https://www.youtube.com/results?search_query=NumPy+for+machine+learning+tutorial"}],exercise:"Create a NumPy array of 10 Zomato restaurant ratings (make up numbers between 2.5 and 5.0). Find the mean, max, and min. Then filter and print only ratings above 4.0.",keyTerms:["ndarray","broadcasting","vectorisation","dot product","reshape"]},
{day:3,mod:1,title:"Pandas — Loading & Exploring Data",objectives:["Load a CSV dataset into Pandas","Run a quick 4-line inspection on any dataset","Filter rows based on conditions"],content:`<p><strong>In one line:</strong> A Pandas DataFrame is like an Excel sheet in Python — rows are records, columns are features, and you can filter or summarize millions of rows in one line.</p><p>The first four lines you run on any new dataset: <code>df.shape</code> (how big?), <code>df.dtypes</code> (what types?), <code>df.describe()</code> (basic stats), <code>df.isnull().sum()</code> (missing values). These four tell you 80% of what you need before any analysis.</p><p>Think of filtering like searching on Swiggy — you want only restaurants with rating above 4 in Hyderabad. Same idea: select rows that match your condition.</p>`,code:`# Load and inspect the Titanic dataset\nimport pandas as pd\n\nurl = "https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv"\ndf = pd.read_csv(url)\n\nprint(df.shape)           # How many rows and columns?\nprint(df.isnull().sum())  # Any missing values?\nprint(df.describe())      # Basic stats\n\n# Filter: first-class passengers only\nfirst_class = df[df['Pclass'] == 1]\nprint(f"First-class passengers: {len(first_class)}")`,resources:[{title:"Pandas Full Course – Corey Schafer",url:"https://www.youtube.com/results?search_query=Pandas+tutorial+Corey+Schafer+full+course"},{title:"Pandas for Data Analysis – Keith Galli",url:"https://www.youtube.com/results?search_query=Pandas+data+analysis+Keith+Galli"}],exercise:"Load the Titanic dataset. Print: how many passengers, what percentage survived, and average age. Just these three — keep it simple.",keyTerms:["DataFrame","Series","boolean indexing","describe","isnull"]},
{day:4,mod:1,title:"Pandas — Data Cleaning",objectives:["Find and fix missing values","Remove duplicates","Understand when to fill vs when to drop"],content:`<p><strong>In one line:</strong> Data cleaning means fixing missing values, wrong types, and duplicates so your dataset is ready for a model.</p><p>Real datasets are always messy — think of a hospital register where some patients skipped their age or a Flipkart order sheet with blank addresses. Your job is to fix these before any analysis.</p><p>Rule of thumb: fill missing numbers with the median (not mean, because outliers skew the mean), fill missing categories with the most common value (mode), and drop a column only if more than 50% of values are missing.</p>`,code:`# Clean the Titanic dataset step by step\nimport pandas as pd\n\ndf = pd.read_csv("titanic.csv")\nprint("Before:", df.isnull().sum())\n\n# Fill Age with median\ndf['Age'].fillna(df['Age'].median(), inplace=True)\n\n# Fill Embarked with most common value\ndf['Embarked'].fillna(df['Embarked'].mode()[0], inplace=True)\n\n# Drop Cabin — 77% missing, not worth keeping\ndf.drop(columns=['Cabin'], inplace=True)\n\nprint("After:", df.isnull().sum())  # Should be 0`,resources:[{title:"Pandas Data Cleaning Tutorial",url:"https://www.youtube.com/results?search_query=Pandas+data+cleaning+tutorial+Python"},{title:"Handling Missing Data – Keith Galli",url:"https://www.youtube.com/results?search_query=pandas+missing+data+handling+Python+tutorial"}],exercise:"On the Titanic dataset: fill Age with median, fill Embarked with mode, drop Cabin. Print isnull().sum() before and after to confirm all nulls are fixed.",keyTerms:["fillna","dropna","isnull","dtype conversion","imputation"]},
{day:5,mod:1,title:"Pandas — GroupBy & New Features",objectives:["Use groupby to summarize data by category","Create new columns from existing ones","Read a groupby result and draw a simple insight"],content:`<p><strong>In one line:</strong> <code>groupby()</code> splits your data into groups and lets you calculate stats for each group — like checking average Zomato rating per city.</p><p>Think of it like a class teacher calculating the average score per section — Section A: 72, Section B: 85. That's groupby. You split by section, then find the mean.</p><p>Creating new features is equally powerful: combine "siblings on board" and "parents on board" into one "FamilySize" column that tells a better story.</p>`,code:`# GroupBy and feature creation on Titanic data\nimport pandas as pd\n\ndf = pd.read_csv("titanic.csv")\n\n# Average survival rate by ticket class\nresult = df.groupby('Pclass')['Survived'].mean()\nprint("Survival rate by class:")\nprint(result.round(2))\n\n# Create a new FamilySize feature\ndf['FamilySize'] = df['SibSp'] + df['Parch'] + 1\ndf['IsAlone'] = df['FamilySize'].map(lambda x: 1 if x == 1 else 0)\nprint(df[['FamilySize', 'IsAlone']].head())`,resources:[{title:"Pandas GroupBy Tutorial",url:"https://www.youtube.com/results?search_query=pandas+groupby+tutorial+Python+data+analysis"},{title:"Pandas Merge and Join",url:"https://www.youtube.com/results?search_query=pandas+merge+join+concat+tutorial"}],exercise:"Group Titanic passengers by Pclass and print the average survival rate per class. Then create a FamilySize column. Which class had the highest survival rate?",keyTerms:["groupby","agg","merge","apply","pivot_table"]},
{day:6,mod:1,title:"Visualisation with Seaborn",objectives:["Create a bar chart and a heatmap with Seaborn","Choose the right chart type for your data","Read a correlation heatmap and draw one insight"],content:`<p><strong>In one line:</strong> Seaborn turns your Pandas DataFrame into clear charts with very little code.</p><p>Use a bar chart to compare categories (e.g., survival rate by ticket class), a histogram to see how a number is spread (e.g., age distribution), and a heatmap to see which features are related to each other.</p><p>One rule: pick one chart per question. Don't throw six charts at once — pick the one that best answers what you're asking.</p>`,code:`# Two useful charts on Titanic data\nimport seaborn as sns\nimport matplotlib.pyplot as plt\nimport pandas as pd\n\ndf = pd.read_csv("titanic.csv")\n\n# Chart 1: Survival rate by class\nsns.barplot(data=df, x='Pclass', y='Survived')\nplt.title('Survival Rate by Ticket Class')\nplt.show()\n\n# Chart 2: Correlation heatmap\ncorr = df.select_dtypes('number').corr()\nsns.heatmap(corr, annot=True, fmt='.2f')\nplt.title('Which features are related?')\nplt.show()`,resources:[{title:"Seaborn Tutorial – sentdex",url:"https://www.youtube.com/results?search_query=seaborn+tutorial+Python+data+visualisation+sentdex"},{title:"Data Visualisation with Python",url:"https://www.youtube.com/results?search_query=matplotlib+seaborn+data+visualisation+complete+tutorial"}],exercise:"Create 2 charts on the Titanic dataset: (1) a bar chart of survival rate by Pclass, (2) a correlation heatmap. Write one sentence describing what each chart tells you.",keyTerms:["seaborn","heatmap","barplot","histogram","subplots"]},
{day:7,mod:1,title:"Exploratory Data Analysis (EDA)",objectives:["Follow a 4-step EDA workflow","Detect outliers using IQR","Write one insight from your data"],content:`<p><strong>In one line:</strong> EDA means looking at your data carefully before modelling — like a doctor checking vitals before prescribing medicine.</p><p>Follow this order: check shape and types → check missing values → look at distributions → look at correlations. Document what you find — each insight guides what features to create.</p><p>An outlier is a value that's unusually far from the rest. A student who scores 99 when everyone else scores 55–65 is an outlier. The IQR method finds these automatically.</p>`,code:`# EDA workflow on Titanic\nimport pandas as pd\n\ndf = pd.read_csv("titanic.csv")\n\n# Step 1: shape and types\nprint(df.shape, df.dtypes)\n\n# Step 2: missing values\nprint(df.isnull().sum())\n\n# Step 3: outlier check on Fare using IQR\nQ1, Q3 = df['Fare'].quantile(0.25), df['Fare'].quantile(0.75)\nIQR = Q3 - Q1\noutliers = df[(df['Fare'] < Q1 - 1.5*IQR) | (df['Fare'] > Q3 + 1.5*IQR)]\nprint(f"Fare outliers: {len(outliers)}")`,resources:[{title:"Complete EDA Tutorial Python",url:"https://www.youtube.com/results?search_query=exploratory+data+analysis+Python+complete+tutorial"},{title:"EDA with Pandas – Kaggle",url:"https://www.youtube.com/results?search_query=kaggle+EDA+pandas+data+science+tutorial"}],exercise:"Run the EDA workflow above on the Titanic dataset. Find outliers in the Fare column. Write two sentences about what you found.",keyTerms:["EDA","IQR","outlier","skewness","correlation"]},
{day:8,mod:1,title:"Feature Engineering",objectives:["Turn text categories into numbers using One-Hot Encoding","Scale numbers so all features are on the same range","Create one new useful feature from existing columns"],content:`<p><strong>In one line:</strong> Feature engineering means converting raw data into a form that a machine learning model can actually understand and use.</p><p>Models cannot understand text like "Male" or "Female" — you must convert those to numbers. One-Hot Encoding creates a column for each category: Sex_male=1 or Sex_male=0. This is the standard way to handle categories with no order (like city names or blood groups).</p><p>Scaling matters because some algorithms (like KNN and SVM) treat big numbers as more important. A fare of ₹5000 should not dominate an age of 25 just because it is a bigger number.</p>`,code:`# Feature engineering on Titanic\nimport pandas as pd\nfrom sklearn.preprocessing import StandardScaler\n\ndf = pd.read_csv("titanic.csv")\ndf['Age'].fillna(df['Age'].median(), inplace=True)\n\n# One-Hot Encode the Sex column\ndf = pd.get_dummies(df, columns=['Sex'], drop_first=True)\nprint(df[['Sex_male']].head())\n\n# Create a new FamilySize feature\ndf['FamilySize'] = df['SibSp'] + df['Parch'] + 1\n\n# Scale Age and Fare\nscaler = StandardScaler()\ndf[['Age', 'Fare']] = scaler.fit_transform(df[['Age', 'Fare']])\nprint(df[['Age', 'Fare', 'FamilySize']].head())`,resources:[{title:"Feature Engineering Python scikit-learn",url:"https://www.youtube.com/results?search_query=feature+engineering+Python+scikit-learn+tutorial"},{title:"Encoding Categorical Variables",url:"https://www.youtube.com/results?search_query=one+hot+encoding+label+encoding+Python+tutorial"}],exercise:"On the Titanic dataset: One-Hot Encode the Sex column, create a FamilySize column, and scale Age and Fare with StandardScaler. Print the first 5 rows of your updated DataFrame.",keyTerms:["OneHotEncoding","LabelEncoder","StandardScaler","feature creation","get_dummies"]},
{day:9,mod:1,title:"Statistical Thinking for ML",objectives:["Understand what correlation means and what it does not mean","Use a chi-square test to check if two categories are related","Check if a number column is normally distributed"],content:`<p><strong>In one line:</strong> Statistics helps you understand your data before trusting a model — it tells you which features actually matter and which are misleading.</p><p>Correlation ≠ causation. Ice cream sales and drowning rates both go up in summer — but ice cream does not cause drowning. Before using a correlation as a model feature, ask: "Is there a real reason this relationship exists?"</p><p>A chi-square test answers: "Are these two categories actually related, or is the pattern just random chance?" If p-value is below 0.05, the relationship is real.</p>`,code:`# Statistical tests on Titanic\nimport pandas as pd\nimport scipy.stats as stats\n\ndf = pd.read_csv("titanic.csv")\n\n# Is Gender related to Survival? Chi-square test\ncontingency = pd.crosstab(df['Sex'], df['Survived'])\nchi2, p, dof, expected = stats.chi2_contingency(contingency)\nif p < 0.05:\n    print(f"Yes, Gender and Survival are related (p={p:.6f})")\nelse:\n    print(f"No significant relationship (p={p:.6f})")`,resources:[{title:"Statistics for Data Science – StatQuest",url:"https://www.youtube.com/results?search_query=statistics+for+machine+learning+StatQuest+complete"},{title:"Probability and Statistics Python",url:"https://www.youtube.com/results?search_query=probability+statistics+Python+data+science+tutorial"}],exercise:"Run a chi-square test between Pclass and Survived on the Titanic dataset. Is ticket class related to survival? Print the p-value and write one sentence explaining what it means.",keyTerms:["chi-square","p-value","correlation","normality","causation"]},
{day:10,mod:1,title:"scikit-learn Pipelines",objectives:["Understand what data leakage is and why it matters","Chain preprocessing and a model into one Pipeline","Fit on training data only — never on the full dataset"],content:`<p><strong>In one line:</strong> A scikit-learn Pipeline chains your cleaning steps and your model together so you never accidentally leak test data into your training.</p><p>The #1 beginner mistake: scaling the full dataset before splitting into train and test. This gives the scaler information from the test set, making your model look better than it really is. A Pipeline prevents this automatically.</p><p>Think of it like an IRCTC ticket booking system — it processes each passenger's request through the same steps in order, without one passenger's data leaking into another's booking.</p>`,code:`# Pipeline prevents data leakage automatically\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.ensemble import RandomForestClassifier\nfrom sklearn.model_selection import train_test_split\nimport pandas as pd\n\ndf = pd.read_csv("titanic.csv")\ndf['Age'].fillna(df['Age'].median(), inplace=True)\ndf = pd.get_dummies(df, columns=['Sex'], drop_first=True)\nX = df[['Age', 'Fare', 'Pclass', 'Sex_male']]\ny = df['Survived']\n\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\n\npipeline = Pipeline([\n    ('scaler', StandardScaler()),\n    ('model', RandomForestClassifier(n_estimators=100, random_state=42))\n])\npipeline.fit(X_train, y_train)\nprint(f"Accuracy: {pipeline.score(X_test, y_test):.3f}")`,resources:[{title:"scikit-learn Pipeline Tutorial",url:"https://www.youtube.com/results?search_query=sklearn+pipeline+ColumnTransformer+tutorial+Python"},{title:"Preventing Data Leakage in ML",url:"https://www.youtube.com/results?search_query=data+leakage+machine+learning+prevention+tutorial"}],exercise:"Build a Pipeline with StandardScaler + RandomForest on the Titanic dataset. Report the accuracy. This is your first complete, leak-free ML workflow.",keyTerms:["Pipeline","fit_transform","data leakage","train_test_split","preprocessing"]},
{day:11,mod:1,title:"Finding & Loading Real Datasets",objectives:["Find a dataset on Kaggle","Load it into Pandas and run a quick inspection","Identify at least one data quality issue"],content:`<p><strong>In one line:</strong> Kaggle is your best source for free real-world datasets — it has thousands of datasets on cricket, Bollywood, IPL, Indian elections, and much more.</p><p>Before using any dataset, always check: how many rows and columns, are there missing values, and what are the column types. A biased or broken dataset produces a broken model — garbage in, garbage out.</p><p>Also check the license. Some datasets are free for learning but not for commercial projects. Always read the description page before downloading.</p>`,code:`# Load a dataset from Kaggle or a URL\nimport pandas as pd\n\n# Example: load directly from a URL\ndf = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv")\n\n# Quick inspection\nprint(df.shape)\nprint(df.dtypes)\nprint(df.isnull().sum())\nprint(df.describe())`,resources:[{title:"Kaggle Datasets Guide",url:"https://www.youtube.com/results?search_query=kaggle+datasets+how+to+use+for+beginners"},{title:"Hugging Face Datasets Tutorial",url:"https://www.youtube.com/results?search_query=Hugging+Face+datasets+library+tutorial+Python"}],exercise:"Go to kaggle.com/datasets and find any dataset about India (cricket, weather, elections, etc.). Download it, load it in Colab, run the 4-line inspection, and write 2 observations about what you found.",keyTerms:["Kaggle","data license","schema","EDA","CSV"]},
{day:12,mod:1,title:"Module 1 Project — EDA Report",objectives:["Apply Days 1–11 skills in one notebook","Produce a clean, readable EDA report","Write 3 insights from your data in plain English"],content:`<p><strong>In one line:</strong> Today you build a complete data analysis notebook that someone else can read and understand — not just run.</p><p>Use the Titanic dataset (or any Indian dataset from Kaggle you found on Day 11). The structure is: load → clean → create 2 features → draw 2 charts → write 3 insights. Keep it focused.</p><p>The most important part is the written insights — not the code. "First-class passengers were 3x more likely to survive" is more valuable than a chart with no explanation.</p>`,code:`# Project template — fill in each section\nimport pandas as pd\nimport seaborn as sns\nimport matplotlib.pyplot as plt\n\n# 1. LOAD & INSPECT\ndf = pd.read_csv("titanic.csv")\nprint(df.shape)\n\n# 2. CLEAN (fill nulls, drop bad columns)\ndf['Age'].fillna(df['Age'].median(), inplace=True)\ndf.drop(columns=['Cabin'], inplace=True)\n\n# 3. ONE NEW FEATURE\ndf['FamilySize'] = df['SibSp'] + df['Parch'] + 1\n\n# 4. ONE CHART\nsns.barplot(data=df, x='Pclass', y='Survived')\nplt.title('Survival Rate by Class')\nplt.show()\n\n# 5. WRITE your 3 insights as markdown cells in Colab`,resources:[{title:"Complete Data Analysis Project Python",url:"https://www.youtube.com/results?search_query=complete+data+analysis+project+Python+pandas+matplotlib"},{title:"How to Present Data Science Results",url:"https://www.youtube.com/results?search_query=data+science+project+presentation+storytelling"}],exercise:"Submit a Colab notebook with: the 5-step structure above completed, at least 1 chart, and 3 markdown cells with your insights written in your own words.",keyTerms:["data storytelling","EDA report","Colab notebook","insights"]},

{day:13,mod:2,title:"ML Fundamentals & The ML Workflow",objectives:["Distinguish supervised, unsupervised, and reinforcement learning","Understand overfitting vs underfitting","Follow the correct ML workflow order"],content:`<p><strong>In one line:</strong> Machine Learning teaches a computer to find patterns in data so it can make predictions on new data it has never seen before.</p><p>Three types: <strong>Supervised</strong> (you give it labelled examples — like a teacher correcting homework), <strong>Unsupervised</strong> (no labels — the model finds its own groups, like sorting vegetables by type), <strong>Reinforcement</strong> (learns by trial and error with rewards, like a student practising JEE problems until they get them right).</p><p>The golden rule: always split your data into train and test sets <em>before</em> any preprocessing. The test set should never influence your cleaning or scaling steps.</p>`,code:`# The correct ML workflow — follow this order every time\nfrom sklearn.model_selection import train_test_split\nfrom sklearn.preprocessing import StandardScaler\nimport pandas as pd\n\ndf = pd.read_csv("titanic.csv")\ndf['Age'].fillna(df['Age'].median(), inplace=True)\ndf = pd.get_dummies(df, columns=['Sex'], drop_first=True)\nX = df[['Age', 'Fare', 'Pclass', 'Sex_male']]\ny = df['Survived']\n\n# SPLIT FIRST, always\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\nprint(f"Train: {X_train.shape}, Test: {X_test.shape}")`,resources:[{title:"Machine Learning Explained – StatQuest",url:"https://www.youtube.com/results?search_query=machine+learning+algorithms+explained+StatQuest"},{title:"ML Workflow End to End",url:"https://www.youtube.com/results?search_query=machine+learning+workflow+end+to+end+tutorial"}],exercise:"Name 3 real-world problems and label each as Supervised, Unsupervised, or Reinforcement Learning. Example: 'Predict Swiggy delivery time → Supervised'. Do 3 more.",keyTerms:["supervised","unsupervised","reinforcement","overfitting","train_test_split"]},
{day:14,mod:2,title:"Linear Regression",objectives:["Build a linear regression model with scikit-learn","Read and interpret R² and RMSE scores","Understand what the model's coefficient means"],content:`<p><strong>In one line:</strong> Linear Regression draws the best-fitting straight line through your data points to predict a number — like predicting a flat's rent from its size in square feet.</p><p><strong>Real India example:</strong> Swiggy uses regression to predict delivery time based on distance, restaurant preparation time, and number of active orders. The coefficient tells you how much each factor contributes.</p><p>R² is your score: 0.85 means the model explains 85% of the variation in the outcome. RMSE is your average error — if predicting flat prices in Hyderabad, an RMSE of ₹50,000 means your predictions are off by about that much on average.</p>`,code:`# Predict flat rent from size (Linear Regression)\nfrom sklearn.linear_model import LinearRegression\nfrom sklearn.metrics import r2_score, mean_squared_error\nfrom sklearn.model_selection import train_test_split\nimport numpy as np\n\nnp.random.seed(42)\nsize_sqft = np.random.normal(1200, 400, 200)  # flat sizes in sq ft\nrent = size_sqft * 12 + np.random.normal(0, 2000, 200)  # approx rent in Rs\n\nX = size_sqft.reshape(-1, 1)\ny = rent\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\n\nmodel = LinearRegression()\nmodel.fit(X_train, y_train)\npreds = model.predict(X_test)\n\nprint(f"R²: {r2_score(y_test, preds):.3f}")\nprint(f"Avg error: Rs {np.sqrt(mean_squared_error(y_test, preds)):,.0f}")\nprint(f"Coefficient: Rs {model.coef_[0]:.2f} per sq ft")`,resources:[{title:"Linear Regression – StatQuest",url:"https://www.youtube.com/results?search_query=linear+regression+StatQuest+clearly+explained"},{title:"Linear Regression Python scikit-learn",url:"https://www.youtube.com/results?search_query=linear+regression+Python+scikit-learn+tutorial"}],exercise:"Run the flat rent code above. Then change the coefficient from 12 to 20 and re-run. How does R² change? What does that tell you about the relationship between size and rent?",keyTerms:["R²","RMSE","coefficient","LinearRegression","MSE"]},
{day:15,mod:2,title:"Logistic Regression & Classification Metrics",objectives:["Build a classifier with Logistic Regression","Read a confusion matrix","Understand precision vs recall and when each matters"],content:`<p><strong>In one line:</strong> Logistic Regression predicts a yes/no answer (spam or not, pass or fail) by outputting a probability between 0 and 1.</p><p><strong>Real India example:</strong> A bank uses logistic regression to predict whether a loan applicant will default. A wrong "approve" costs money; a wrong "reject" loses a customer. The bank must balance precision and recall carefully.</p><p>Precision asks: of everyone I predicted would default, how many actually did? Recall asks: of everyone who actually defaulted, how many did I catch? When false negatives are dangerous (missing a fraud or a disease), prioritise recall.</p>`,code:`# Classify Titanic survivors with Logistic Regression\nfrom sklearn.linear_model import LogisticRegression\nfrom sklearn.metrics import classification_report, confusion_matrix\nimport seaborn as sns\nimport pandas as pd\nfrom sklearn.model_selection import train_test_split\n\ndf = pd.read_csv("titanic.csv")\ndf['Age'].fillna(df['Age'].median(), inplace=True)\ndf = pd.get_dummies(df, columns=['Sex'], drop_first=True)\nX = df[['Age', 'Fare', 'Pclass', 'Sex_male']]\ny = df['Survived']\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\n\nmodel = LogisticRegression(max_iter=1000)\nmodel.fit(X_train, y_train)\npreds = model.predict(X_test)\n\nprint(classification_report(y_test, preds))\nsns.heatmap(confusion_matrix(y_test, preds), annot=True, fmt='d')`,resources:[{title:"Logistic Regression – StatQuest",url:"https://www.youtube.com/results?search_query=logistic+regression+StatQuest+clearly+explained"},{title:"Classification Metrics Explained",url:"https://www.youtube.com/results?search_query=precision+recall+F1+score+ROC+AUC+explained+Python"}],exercise:"Run the code above and read the classification_report output. Write one sentence each explaining what the precision and recall numbers mean for this dataset.",keyTerms:["sigmoid","confusion matrix","precision","recall","F1"]},
{day:16,mod:2,title:"Decision Trees & Random Forests",objectives:["Understand how a Decision Tree asks questions to classify","Build a Random Forest and compare it to a single tree","Read feature importance to know which columns matter most"],content:`<p><strong>In one line:</strong> A Decision Tree asks a series of yes/no questions about your data to reach a prediction — like a game of 20 questions.</p><p><strong>Real India example:</strong> A bank uses a decision tree to decide loan approval: "Is income > ₹5L? → Yes → Is credit score > 700? → Yes → Approve." The tree is easy to explain to a customer.</p><p>A Random Forest builds 100 of these trees, each on slightly different data, then votes on the final answer. The crowd is usually smarter than any single tree — this is called ensemble learning.</p>`,code:`# Decision Tree vs Random Forest on Titanic\nfrom sklearn.tree import DecisionTreeClassifier\nfrom sklearn.ensemble import RandomForestClassifier\nimport pandas as pd\nfrom sklearn.model_selection import train_test_split\n\ndf = pd.read_csv("titanic.csv")\ndf['Age'].fillna(df['Age'].median(), inplace=True)\ndf = pd.get_dummies(df, columns=['Sex'], drop_first=True)\nX = df[['Age', 'Fare', 'Pclass', 'Sex_male']]\ny = df['Survived']\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\n\ndt = DecisionTreeClassifier(max_depth=4, random_state=42)\ndt.fit(X_train, y_train)\n\nrf = RandomForestClassifier(n_estimators=100, random_state=42)\nrf.fit(X_train, y_train)\n\nprint(f"Single Tree accuracy: {dt.score(X_test, y_test):.3f}")\nprint(f"Random Forest accuracy: {rf.score(X_test, y_test):.3f}")`,resources:[{title:"Random Forest Explained – StatQuest",url:"https://www.youtube.com/results?search_query=random+forest+StatQuest+clearly+explained"},{title:"Decision Tree Python Tutorial",url:"https://www.youtube.com/results?search_query=decision+tree+Python+scikit-learn+tutorial+visualisation"}],exercise:"Train a Decision Tree (max_depth=4) and a Random Forest (100 trees) on the Titanic dataset. Print the accuracy of both. Which one performs better and why do you think that is?",keyTerms:["Decision Tree","Random Forest","feature importance","ensemble","max_depth"]},
{day:17,mod:2,title:"Support Vector Machines",objectives:["Understand what SVM does in plain terms","Train an SVM with the RBF kernel","Understand what the C parameter controls"],content:`<p><strong>In one line:</strong> An SVM draws the widest possible boundary between two classes — like drawing the thickest possible line between "pass" and "fail" students on a scatter plot.</p><p><strong>Real India example:</strong> An SVM can be used to separate NEET-qualified students from non-qualified ones based on their scores in Physics, Chemistry, and Biology. The boundary it draws is the most stable possible given the data.</p><p>The C parameter controls how much you penalise mistakes: high C tries to get everything right (risk of memorising noise), low C allows some mistakes for a simpler boundary (more generalizable).</p>`,code:`# SVM on Titanic data\nfrom sklearn.svm import SVC\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.model_selection import train_test_split\nimport pandas as pd\n\ndf = pd.read_csv("titanic.csv")\ndf['Age'].fillna(df['Age'].median(), inplace=True)\ndf = pd.get_dummies(df, columns=['Sex'], drop_first=True)\nX = df[['Age', 'Fare', 'Pclass', 'Sex_male']]\ny = df['Survived']\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\n\n# SVM needs scaling — use a Pipeline\npipe = Pipeline([('scaler', StandardScaler()), ('svm', SVC(kernel='rbf', C=1.0))])\npipe.fit(X_train, y_train)\nprint(f"SVM Accuracy: {pipe.score(X_test, y_test):.3f}")`,resources:[{title:"SVM Explained Visually – StatQuest",url:"https://www.youtube.com/results?search_query=support+vector+machines+StatQuest+clearly+explained"},{title:"SVM Python scikit-learn Tutorial",url:"https://www.youtube.com/results?search_query=SVM+Python+scikit-learn+kernel+tutorial"}],exercise:"Train an SVM on Titanic with C=0.1, then C=10. Print the accuracy for each. Which C value gives better accuracy? What does this tell you about the data?",keyTerms:["support vectors","kernel trick","RBF","C parameter","margin"]},
{day:18,mod:2,title:"KNN & Naive Bayes",objectives:["Understand how KNN classifies by looking at neighbours","Build a Naive Bayes text classifier","Know when to use each algorithm"],content:`<p><strong>In one line:</strong> KNN classifies a new data point by finding its K nearest neighbours in the training data and taking a majority vote — like asking the 5 students sitting closest to you what answer they got.</p><p><strong>Real India example:</strong> Zomato might use KNN to recommend a restaurant: "Find the 5 most similar users to Priya. What did they order? Recommend that to Priya."</p><p>Naive Bayes is great for text: given a WhatsApp message, it looks at which words appear most often in spam vs genuine messages and makes a fast decision. It works well even with small datasets.</p>`,code:`# Naive Bayes spam classifier\nfrom sklearn.naive_bayes import MultinomialNB\nfrom sklearn.feature_extraction.text import TfidfVectorizer\nfrom sklearn.pipeline import Pipeline\nimport pandas as pd\nfrom sklearn.model_selection import train_test_split\n\ndf = pd.read_csv("spam.csv", encoding='latin-1')[['v1', 'v2']]\ndf.columns = ['label', 'text']\ndf['label'] = (df['label'] == 'spam').astype(int)\n\nX_train, X_test, y_train, y_test = train_test_split(df['text'], df['label'], test_size=0.2)\n\npipe = Pipeline([('tfidf', TfidfVectorizer()), ('nb', MultinomialNB())])\npipe.fit(X_train, y_train)\nprint(f"Accuracy: {pipe.score(X_test, y_test):.3f}")\n\n# Test on a new message\nprint(pipe.predict(["Win a free iPhone now! Click here"]))`,resources:[{title:"Naive Bayes Explained – StatQuest",url:"https://www.youtube.com/results?search_query=naive+bayes+StatQuest+clearly+explained"},{title:"KNN Algorithm Tutorial",url:"https://www.youtube.com/results?search_query=KNN+algorithm+explained+Python+tutorial"}],exercise:"Build the spam classifier above. Test it on 3 messages you write yourself — 1 obvious spam, 1 obvious genuine, 1 borderline case. Does the model get all three right?",keyTerms:["KNN","Naive Bayes","TF-IDF","text classification","spam"]},
{day:19,mod:2,title:"Gradient Boosting & XGBoost",objectives:["Understand what boosting means in plain terms","Build an XGBoost model on a real dataset","Know the 3 most important hyperparameters to tune"],content:`<p><strong>In one line:</strong> XGBoost builds trees one at a time, where each new tree focuses on fixing the mistakes the previous trees made — like a student correcting their wrong answers after each mock test.</p><p><strong>Real India example:</strong> XGBoost is widely used in Indian fintech companies to predict loan default risk, because it handles missing values automatically and works well on tabular data with many features.</p><p>Three hyperparameters that matter most: <code>n_estimators</code> (how many trees — more is usually better up to a point), <code>learning_rate</code> (how much each tree corrects — lower is more careful), <code>max_depth</code> (how deep each tree grows — 3–6 is usually enough).</p>`,code:`# XGBoost on Titanic\nimport xgboost as xgb\nfrom sklearn.model_selection import train_test_split\nimport pandas as pd\n\ndf = pd.read_csv("titanic.csv")\ndf['Age'].fillna(df['Age'].median(), inplace=True)\ndf = pd.get_dummies(df, columns=['Sex'], drop_first=True)\nX = df[['Age', 'Fare', 'Pclass', 'Sex_male']]\ny = df['Survived']\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\n\nmodel = xgb.XGBClassifier(\n    n_estimators=200,\n    learning_rate=0.1,\n    max_depth=4,\n    random_state=42\n)\nmodel.fit(X_train, y_train)\nprint(f"XGBoost Accuracy: {model.score(X_test, y_test):.3f}")`,resources:[{title:"XGBoost Tutorial Python",url:"https://www.youtube.com/results?search_query=XGBoost+tutorial+Python+scikit-learn+Kaggle"},{title:"Gradient Boosting Explained – StatQuest",url:"https://www.youtube.com/results?search_query=gradient+boosting+StatQuest+clearly+explained"}],exercise:"Train XGBoost on Titanic. Compare accuracy when you use learning_rate=0.01 vs learning_rate=0.3 (keep all other settings the same). Which gives a better result and why?",keyTerms:["XGBoost","boosting","learning_rate","n_estimators","max_depth"]},
{day:20,mod:2,title:"Model Evaluation & Cross-Validation",objectives:["Understand why one train/test split is not enough","Use 5-fold cross-validation to get a reliable score","Compare two models and say which is better with confidence"],content:`<p><strong>In one line:</strong> Cross-validation tests your model 5 different times on 5 different splits of data and averages the score — so your result does not depend on one lucky or unlucky split.</p><p>Think of it like giving a student 5 different exam papers (all from the same syllabus) and averaging their marks — a better measure of actual knowledge than one single exam on one day.</p><p>If your training accuracy is 95% but test accuracy is 70%, your model memorised the training data instead of learning patterns. That is overfitting — try reducing tree depth or adding regularisation.</p>`,code:`# Cross-validation to compare two models\nfrom sklearn.model_selection import cross_val_score\nfrom sklearn.ensemble import RandomForestClassifier\nfrom sklearn.linear_model import LogisticRegression\nimport pandas as pd\n\ndf = pd.read_csv("titanic.csv")\ndf['Age'].fillna(df['Age'].median(), inplace=True)\ndf = pd.get_dummies(df, columns=['Sex'], drop_first=True)\nX = df[['Age', 'Fare', 'Pclass', 'Sex_male']]\ny = df['Survived']\n\nfor name, model in [("Logistic Regression", LogisticRegression()), ("Random Forest", RandomForestClassifier(n_estimators=100))]:\n    scores = cross_val_score(model, X, y, cv=5, scoring='accuracy')\n    print(f"{name}: {scores.mean():.3f} ± {scores.std():.3f}")`,resources:[{title:"Cross Validation – StatQuest",url:"https://www.youtube.com/results?search_query=cross+validation+StatQuest+machine+learning"},{title:"Learning Curves Python Tutorial",url:"https://www.youtube.com/results?search_query=learning+curves+overfitting+underfitting+Python+tutorial"}],exercise:"Run 5-fold cross-validation on both Logistic Regression and Random Forest on the Titanic dataset. Which one has a higher mean accuracy? Which one has lower variance (smaller ± number)?",keyTerms:["k-Fold","cross_val_score","overfitting","train accuracy","validation"]},
{day:21,mod:2,title:"Hyperparameter Tuning",objectives:["Understand what a hyperparameter is","Use GridSearchCV to find the best settings","Compare before-tuning and after-tuning accuracy"],content:`<p><strong>In one line:</strong> Hyperparameter tuning means finding the best settings for your model — like adjusting the oven temperature to get the perfect roti instead of guessing.</p><p>Hyperparameters are settings you choose before training (like max_depth for a tree, or n_estimators for a forest). GridSearchCV tries every combination you give it and returns the best one using cross-validation.</p><p>Start with a small grid of 2–3 values per parameter. Running 50+ combinations takes time on Colab, so keep it focused on the 2–3 hyperparameters that matter most.</p>`,code:`# Tune Random Forest with GridSearchCV\nfrom sklearn.model_selection import GridSearchCV\nfrom sklearn.ensemble import RandomForestClassifier\nimport pandas as pd\nfrom sklearn.model_selection import train_test_split\n\ndf = pd.read_csv("titanic.csv")\ndf['Age'].fillna(df['Age'].median(), inplace=True)\ndf = pd.get_dummies(df, columns=['Sex'], drop_first=True)\nX = df[['Age', 'Fare', 'Pclass', 'Sex_male']]\ny = df['Survived']\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\n\nparam_grid = {'n_estimators': [50, 100, 200], 'max_depth': [3, 5, None]}\ngrid = GridSearchCV(RandomForestClassifier(random_state=42), param_grid, cv=5)\ngrid.fit(X_train, y_train)\nprint(f"Best params: {grid.best_params_}")\nprint(f"Best CV score: {grid.best_score_:.3f}")`,resources:[{title:"Hyperparameter Tuning Python Tutorial",url:"https://www.youtube.com/results?search_query=hyperparameter+tuning+GridSearchCV+RandomizedSearchCV+Python"},{title:"Scikit-learn Model Selection Guide",url:"https://www.youtube.com/results?search_query=scikit-learn+model+selection+hyperparameter+optimisation"}],exercise:"Run the GridSearchCV above on Titanic. Write down: (1) the default Random Forest accuracy, (2) the best params found, (3) the tuned accuracy. Did tuning help?",keyTerms:["GridSearchCV","hyperparameter","n_estimators","max_depth","cross-validation"]},
{day:22,mod:2,title:"Unsupervised Learning — Clustering",objectives:["Understand what clustering does without labels","Build a k-Means model and pick the right K","Read the elbow chart to choose K"],content:`<p><strong>In one line:</strong> Clustering groups similar data points together automatically, without any labels — like sorting your contacts into groups (college, family, work) without being told which group each person belongs to.</p><p><strong>Real India example:</strong> Flipkart uses clustering to group customers: deal-hunters who only buy during sales, premium buyers who order expensive gadgets, and students who buy stationery. Each group gets different marketing.</p><p>Use the elbow method to choose K: plot the "inertia" (total within-cluster distance) for K=2 to 10. The bend in the curve is where adding more clusters stops helping much.</p>`,code:`# K-Means clustering on Iris dataset\nfrom sklearn.cluster import KMeans\nfrom sklearn.datasets import load_iris\nfrom sklearn.preprocessing import StandardScaler\nimport matplotlib.pyplot as plt\n\niris = load_iris()\nX = StandardScaler().fit_transform(iris.data)\n\n# Elbow method\ninertias = []\nfor k in range(2, 8):\n    km = KMeans(n_clusters=k, random_state=42, n_init=10)\n    km.fit(X)\n    inertias.append(km.inertia_)\n\nplt.plot(range(2, 8), inertias, 'bx-')\nplt.xlabel('K'); plt.ylabel('Inertia')\nplt.title('Elbow Method — pick K at the bend')\nplt.show()`,resources:[{title:"K-Means Clustering – StatQuest",url:"https://www.youtube.com/results?search_query=k-means+clustering+StatQuest+explained"},{title:"DBSCAN Clustering Tutorial",url:"https://www.youtube.com/results?search_query=DBSCAN+clustering+Python+tutorial"}],exercise:"Run the elbow method above on the Iris dataset. Which K does the elbow suggest? Then run KMeans with that K and print the cluster labels for the first 10 rows.",keyTerms:["k-Means","inertia","elbow method","clustering","centroid"]},
{day:23,mod:2,title:"Dimensionality Reduction with PCA",objectives:["Understand why reducing features can help a model","Apply PCA to reduce a dataset's columns","Use explained variance to decide how many components to keep"],content:`<p><strong>In one line:</strong> PCA compresses many features into fewer combined features while keeping as much information as possible — like summarising a 10-page report into 2 pages without losing the key points.</p><p>Imagine a dataset with 100 features measuring slightly different things. Many of these features are correlated (height and weight, for example). PCA merges them into fewer independent "super-features" called principal components.</p><p>The explained variance ratio tells you how much information each component keeps. If 3 components capture 95% of the variance, you can safely drop the remaining 97 columns.</p>`,code:`# PCA on the digits dataset (64 features → fewer)\nfrom sklearn.decomposition import PCA\nfrom sklearn.datasets import load_digits\nfrom sklearn.preprocessing import StandardScaler\n\ndigits = load_digits()\nX = StandardScaler().fit_transform(digits.data)\n\npca = PCA()\npca.fit(X)\n\ncumvar = pca.explained_variance_ratio_.cumsum()\nn_for_95 = (cumvar >= 0.95).argmax() + 1\nprint(f"Original features: {X.shape[1]}")\nprint(f"Features needed for 95% variance: {n_for_95}")`,resources:[{title:"PCA Explained – StatQuest",url:"https://www.youtube.com/results?search_query=PCA+principal+component+analysis+StatQuest+explained"},{title:"t-SNE Explained Visually",url:"https://www.youtube.com/results?search_query=t-SNE+visualisation+Python+tutorial+explained"}],exercise:"Run the PCA code above on the digits dataset. How many components do you need for 95% variance? Compare this to the original 64 features. Write one sentence explaining what this means.",keyTerms:["PCA","explained variance","dimensionality reduction","principal components","StandardScaler"]},
{day:24,mod:2,title:"NLP Basics & Text Classification",objectives:["Understand how text gets converted to numbers for ML","Build a TF-IDF + classifier pipeline for spam detection","Read the top spam keywords that the model learned"],content:`<p><strong>In one line:</strong> To classify text with ML, you must first convert words into numbers — TF-IDF does this by scoring each word based on how often it appears in a message vs how common it is across all messages.</p><p>Think of it like Swiggy reviews: words like "cold" and "late" score high in bad reviews, while "fresh" and "quick" score high in good ones. TF-IDF automatically finds these signature words.</p><p>The full pipeline is just two steps: TF-IDF vectorizer converts text to numbers, then a classifier (Logistic Regression or Naive Bayes) makes the prediction.</p>`,code:`# Build a spam classifier using TF-IDF\nfrom sklearn.feature_extraction.text import TfidfVectorizer\nfrom sklearn.linear_model import LogisticRegression\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.model_selection import train_test_split\nimport pandas as pd\n\ndf = pd.read_csv("spam.csv", encoding='latin-1')[['v1', 'v2']]\ndf.columns = ['label', 'text']\ndf['label'] = (df['label'] == 'spam').astype(int)\n\nX_train, X_test, y_train, y_test = train_test_split(df['text'], df['label'], test_size=0.2)\n\npipe = Pipeline([('tfidf', TfidfVectorizer(max_features=3000)), ('clf', LogisticRegression())])\npipe.fit(X_train, y_train)\nprint(f"Accuracy: {pipe.score(X_test, y_test):.3f}")\nprint(pipe.predict(["Congratulations! You won a free trip to Goa. Call now!"]))`,resources:[{title:"NLP Tutorial Python Beginners",url:"https://www.youtube.com/results?search_query=NLP+tutorial+Python+beginners+text+classification"},{title:"TF-IDF Explained Simply",url:"https://www.youtube.com/results?search_query=TF-IDF+explained+simply+Python+tutorial"}],exercise:"Build the spam classifier above and test it on 2 messages: one obvious spam and one genuine message. Does the model classify both correctly? Print the accuracy.",keyTerms:["TF-IDF","text classification","Pipeline","spam","LogisticRegression"]},
{day:25,mod:2,title:"Neural Networks with Keras",objectives:["Build a 3-layer neural network with Keras","Train it on the MNIST handwritten digits dataset","Read the training loss and accuracy output"],content:`<p><strong>In one line:</strong> Keras lets you build a neural network by stacking layers — like stacking floors in a building — where each layer learns increasingly complex patterns from the data.</p><p>The MNIST dataset is 70,000 images of handwritten digits (0–9). Your network will look at each 28×28 pixel image and predict which digit it is. A 3-layer network can reach 97%+ accuracy in under 2 minutes on Colab.</p><p>Key choices that work for almost every classification problem: ReLU activation for hidden layers, softmax for the output layer, and Adam as the optimizer.</p>`,code:`# Handwritten digit classifier with Keras\nimport tensorflow as tf\nfrom tensorflow import keras\n\n(X_train, y_train), (X_test, y_test) = keras.datasets.mnist.load_data()\nX_train = X_train.reshape(-1, 784) / 255.0\nX_test  = X_test.reshape(-1, 784) / 255.0\n\nmodel = keras.Sequential([\n    keras.layers.Dense(128, activation='relu', input_shape=(784,)),\n    keras.layers.Dense(64, activation='relu'),\n    keras.layers.Dense(10, activation='softmax')\n])\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy', metrics=['accuracy'])\nmodel.fit(X_train, y_train, epochs=5, validation_split=0.1)\nprint(f"Test accuracy: {model.evaluate(X_test, y_test)[1]:.3f}")`,resources:[{title:"Keras Neural Network Tutorial – freeCodeCamp",url:"https://www.youtube.com/results?search_query=Keras+neural+network+tutorial+freeCodeCamp"},{title:"Deep Learning with Python Keras",url:"https://www.youtube.com/results?search_query=deep+learning+Python+Keras+beginner+tutorial"}],exercise:"Run the MNIST classifier above. What test accuracy do you get? Then change the first Dense layer from 128 to 64 neurons and re-run. Does accuracy drop? By how much?",keyTerms:["Dense","ReLU","softmax","Adam","Keras","epoch"]},
{day:26,mod:2,title:"Transfer Learning for Images",objectives:["Understand what transfer learning means in plain terms","Load a pretrained EfficientNet model in Keras","Add a custom output layer for your own classes"],content:`<p><strong>In one line:</strong> Transfer learning means taking a model already trained on millions of images and reusing its knowledge for your own smaller dataset — like hiring an expert instead of training one from scratch.</p><p>EfficientNetB0 was trained on 1.2 million images across 1000 categories. It already knows how to detect edges, textures, and shapes in images. You only need to train the last layer for your specific categories.</p><p>This is how most real image classification projects work in India's tech industry — no one trains a CNN from scratch for every project. You always start with a pretrained model.</p>`,code:`# Transfer learning with EfficientNetB0\nfrom tensorflow import keras\n\n# Load pretrained model — no top layer\nbase_model = keras.applications.EfficientNetB0(\n    include_top=False, weights='imagenet', input_shape=(224, 224, 3)\n)\nbase_model.trainable = False  # freeze — keep its learned features\n\n# Add your custom output for, say, 3 classes\nmodel = keras.Sequential([\n    base_model,\n    keras.layers.GlobalAveragePooling2D(),\n    keras.layers.Dense(3, activation='softmax')  # 3 = your number of classes\n])\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy', metrics=['accuracy'])\nmodel.summary()`,resources:[{title:"Transfer Learning Keras Tutorial",url:"https://www.youtube.com/results?search_query=transfer+learning+Keras+EfficientNet+tutorial"},{title:"CNN Architecture Explained",url:"https://www.youtube.com/results?search_query=CNN+convolutional+neural+network+explained+Python"}],exercise:"Run the code above and call model.summary(). Count how many trainable vs non-trainable parameters there are. Write one sentence explaining why this makes transfer learning so fast to train.",keyTerms:["transfer learning","EfficientNet","pretrained","feature extraction","fine-tuning"]},
{day:27,mod:2,title:"Model Deployment Basics",objectives:["Save a trained model to a file with joblib","Serve predictions via a Flask API","Test the API with a real request from Python"],content:`<p><strong>In one line:</strong> Deployment means saving your trained model to a file and wrapping it in an API so that other apps can send data and get predictions back.</p><p>Think of it like a restaurant — training is the chef learning recipes, joblib saves the recipe book, Flask opens the restaurant window, and your users place orders through it.</p><p>The most important rule: always save your preprocessing steps (like the scaler) alongside the model. If you scaled your data during training but forget to scale at prediction time, every prediction will be wrong.</p>`,code:`# Save model, then serve via Flask\nimport joblib\nfrom flask import Flask, request, jsonify\n\n# Step 1: Save your trained pipeline\n# joblib.dump(pipeline, 'spam_model.pkl')\n\n# Step 2: Create a Flask API\napp = Flask(__name__)\nmodel = joblib.load('spam_model.pkl')\n\n@app.route('/predict', methods=['POST'])\ndef predict():\n    data = request.json\n    text = data['text']\n    pred = model.predict([text])[0]\n    return jsonify({'label': 'spam' if pred else 'ham'})\n\n# Run: python app.py\n# Test: POST http://localhost:5000/predict with {"text": "Win a free Jio recharge!"}`,resources:[{title:"Deploy ML Model Flask API Tutorial",url:"https://www.youtube.com/results?search_query=deploy+machine+learning+model+Flask+API+Python"},{title:"FastAPI ML Model Serving",url:"https://www.youtube.com/results?search_query=FastAPI+machine+learning+model+deployment+tutorial"}],exercise:"Train the spam classifier from Day 24, save it with joblib.dump(), then load it back and run a prediction on one message. Confirm the prediction matches what you expect.",keyTerms:["joblib","Flask","API","serialisation","inference"]},
{day:28,mod:2,title:"ML Best Practices & Review",objectives:["Avoid the top 3 ML mistakes beginners make","Set random seeds for reproducible results","Choose the right metric for imbalanced data"],content:`<p><strong>In one line:</strong> The three most common ML mistakes are data leakage, wrong metrics, and not setting random seeds — all of which make your results look better in the notebook than they are in the real world.</p><p>Data leakage is when test data accidentally influences your training. Always split your data FIRST, then preprocess. If you scale before splitting, your scaler has seen test data — and your accuracy score is a lie.</p><p>Always use F1 score (not accuracy) when your dataset is imbalanced. If 99% of transactions are not fraud, a model that always says "not fraud" gets 99% accuracy but catches zero frauds.</p>`,code:`# Checklist for good ML projects\nimport numpy as np, random\nfrom sklearn.metrics import classification_report\nimport pandas as pd\n\n# 1. Set seeds for reproducibility\nrandom.seed(42)\nnp.random.seed(42)\n\n# 2. Check class balance before choosing metrics\nprint("Class distribution:", pd.Series(y_train).value_counts(normalize=True))\n\n# 3. Use classification_report — not just accuracy\nprint(classification_report(y_test, preds, zero_division=0))\n\n# 4. Document your experiment\nexperiment = {'model': 'RandomForest', 'cv_score': 0.83, 'test_score': 0.81}\nprint(experiment)`,resources:[{title:"ML Best Practices Google",url:"https://www.youtube.com/results?search_query=machine+learning+best+practices+production+mistakes"},{title:"Common ML Mistakes to Avoid",url:"https://www.youtube.com/results?search_query=common+machine+learning+mistakes+beginners+avoid"}],exercise:"Look at your best model from this module. Check: did you split before scaling? Did you use the right metric? Did you set random_state=42? Fix any gaps you find.",keyTerms:["data leakage","reproducibility","imbalanced data","random seed","F1 score"]},

{day:25,mod:3,title:"LLMs Deep Dive",objectives:["Understand how LLMs are trained in 3 stages","Know the difference between GPT, Gemini, Claude, and Llama","Make your first API call with Google Gemini"],content:`<p><strong>In one line:</strong> Large Language Models learn by reading trillions of sentences and predicting the next word — after enough practice, they understand language well enough to answer questions, write code, and summarise documents.</p><p>Three training stages: <strong>pre-training</strong> (reads the internet — learns language and facts), <strong>instruction tuning</strong> (learns to follow instructions politely), <strong>RLHF</strong> (human feedback makes it helpful and safe). You are using the output of all three stages when you talk to ChatGPT.</p><p>Four major model families: GPT-4 (OpenAI, best for coding), Gemini (Google, best for images + search), Claude (Anthropic, best for long documents), Llama (Meta, free and runs locally).</p>`,code:`# Your first Gemini API call\nimport google.generativeai as genai\n\ngenai.configure(api_key="YOUR_API_KEY")  # Free at aistudio.google.com\nmodel = genai.GenerativeModel('gemini-1.5-flash')\n\nresponse = model.generate_content(\n    "Explain what a neural network is. Use a cricket analogy. Keep it under 5 sentences."\n)\nprint(response.text)`,resources:[{title:"How LLMs Work – Andrej Karpathy",url:"https://www.youtube.com/results?search_query=Andrej+Karpathy+how+large+language+models+work"},{title:"LLM Families Comparison 2024",url:"https://www.youtube.com/results?search_query=GPT4+Gemini+Claude+comparison+2024+tutorial"}],exercise:"Get a free Gemini API key from aistudio.google.com and run the code above. Change the prompt to explain 'machine learning' using a Swiggy analogy. Did it work? Paste the output.",keyTerms:["pre-training","RLHF","tokenisation","context window","hallucination"]},
{day:26,mod:3,title:"Advanced Prompt Engineering",objectives:["Use few-shot examples inside a prompt","Make the model think step by step with chain-of-thought","Ask for structured JSON output from an LLM"],content:`<p><strong>In one line:</strong> Advanced prompting is about giving the AI the right structure — examples, instructions, and format requirements — so it gives you exactly what you need, not a vague generic answer.</p><p>Few-shot prompting gives 2–3 examples before your real question. The model learns the pattern from your examples — like showing a student 3 solved problems before asking them to solve a new one.</p><p>For JSON output, explicitly say "Return ONLY valid JSON" and show the exact keys you expect. This is how you build reliable data extraction pipelines where you parse the AI's output in your code.</p>`,code:`# Few-shot + JSON output with Gemini\nimport google.generativeai as genai, json\n\ngenai.configure(api_key="YOUR_API_KEY")\nmodel = genai.GenerativeModel('gemini-1.5-flash')\n\nextraction_prompt = """Extract information as JSON.\n\nExample:\nText: "Priya Sharma, 28, Data Analyst at Infosys, priya@email.com"\nJSON: {"name":"Priya Sharma","age":28,"role":"Data Analyst","company":"Infosys"}\n\nNow extract:\nText: "Arjun Reddy, 32, Software Engineer at TCS, arjun@tcs.com"\nReturn ONLY valid JSON.\"\"\"\n\nresponse = model.generate_content(extraction_prompt)\nprint(response.text)`,resources:[{title:"Advanced Prompt Engineering 2024",url:"https://www.youtube.com/results?search_query=advanced+prompt+engineering+techniques+2024+tutorial"},{title:"Chain of Thought Prompting Guide",url:"https://www.youtube.com/results?search_query=chain+of+thought+prompting+few+shot+examples"}],exercise:"Use the extraction prompt above but change the input text to a real bio you write yourself (can be fictional). Does Gemini correctly extract all 4 fields into JSON?",keyTerms:["few-shot","chain-of-thought","JSON output","prompt template","zero-shot"]},
{day:27,mod:3,title:"Google Gemini API — Chat & History",objectives:["Use Gemini for multi-turn chat in Python","Maintain conversation history across messages","Build a simple question-answer chatbot loop"],content:`<p><strong>In one line:</strong> The Gemini API lets you build a chatbot in Python that remembers what was said earlier in the conversation — just like WhatsApp remembers your previous messages.</p><p>A ChatSession keeps track of the full conversation history automatically. Each new message is sent in context of everything said before — so Gemini can refer back to earlier answers.</p><p>The Gemini Flash model is free (up to 1 million tokens per minute on the free tier) and fast enough for classroom demos. Always use 'gemini-1.5-flash' to avoid hitting limits during practice.</p>`,code:`# Multi-turn chat with Gemini\nimport google.generativeai as genai\n\ngenai.configure(api_key="YOUR_API_KEY")\nmodel = genai.GenerativeModel('gemini-1.5-flash')\nchat = model.start_chat(history=[])\n\n# Simulate a 3-turn conversation\nquestions = [\n    "I want to learn machine learning. Where do I start?",\n    "What Python libraries do I need for that?",\n    "How long will it take to be job-ready?"\n]\n\nfor q in questions:\n    response = chat.send_message(q)\n    print(f"You: {q}")\n    print(f"Gemini: {response.text[:200]}\\n")`,resources:[{title:"Google Gemini API Tutorial Python",url:"https://www.youtube.com/results?search_query=Google+Gemini+API+Python+tutorial+2024"},{title:"Gemini API Getting Started",url:"https://www.youtube.com/results?search_query=Gemini+API+getting+started+aistudio+Google"}],exercise:"Run the chat code above. Then add a 4th question that references something Gemini said in a previous answer — does Gemini remember the context? Print its response.",keyTerms:["GenerativeModel","ChatSession","chat history","Gemini Flash","API key"]},
{day:28,mod:3,title:"OpenAI API — Chat Completions",objectives:["Use the OpenAI chat completions API in Python","Write a system message to set the AI persona","Send a user message and print the response"],content:`<p><strong>In one line:</strong> The OpenAI API lets you send messages to GPT models from your Python code and get AI responses back — like a WhatsApp chat, but programmatic.</p><p>Every API call has three message types: <strong>system</strong> (tells the AI who it is and how to behave — the most important one), <strong>user</strong> (what the user says), and <strong>assistant</strong> (what the AI replied — used to carry conversation history).</p><p>Use gpt-4o-mini for practice — it costs less than ₹0.01 per 1000 tokens and is fast. Save your API key in a .env file — never hardcode it in your code.</p>`,code:`# OpenAI Chat Completions API\nfrom openai import OpenAI\n\nclient = OpenAI(api_key="YOUR_OPENAI_KEY")\n\nresponse = client.chat.completions.create(\n    model="gpt-4o-mini",\n    messages=[\n        {"role": "system", "content": "You are a helpful tutor for Indian students preparing for JEE."},\n        {"role": "user", "content": "Explain Newton's Second Law using a cricket ball example."}\n    ]\n)\n\nprint(response.choices[0].message.content)`,resources:[{title:"OpenAI API Python Tutorial 2024",url:"https://www.youtube.com/results?search_query=OpenAI+API+Python+tutorial+function+calling+2024"},{title:"OpenAI Function Calling Tutorial",url:"https://www.youtube.com/results?search_query=OpenAI+function+calling+tools+tutorial+Python"}],exercise:"Run the OpenAI API call above (or use Gemini if you don't have an OpenAI key). Change the system message to make the AI a NEET Biology tutor, then ask about cell division. Print the response.",keyTerms:["chat completions","system message","user message","gpt-4o-mini","API key"]},
  {day:29,mod:3,title:'What is Prompt Engineering?',objectives:['Understand why prompt wording changes the AI output','Learn the 4 parts of a good prompt','Write your first structured prompt'],
   content:`<p class="content-text"><p>Imagine asking a friend for help with homework. If you say "help me with maths" you get a vague answer. If you say "I have a quadratic equation problem for Class 11, explain step by step in simple English", you get exactly what you need. That is Prompt Engineering — asking AI the right way.</p><p>A good prompt has 4 parts: <strong>Role</strong> (who should the AI be?), <strong>Task</strong> (what do you want?), <strong>Context</strong> (background information), <strong>Format</strong> (how should the answer look?).</p></p>`,
   code:`# The 4-Part Prompt Formula
# Role + Task + Context + Format

bad_prompt = "explain machine learning"

good_prompt = """
You are a patient teacher explaining to a Class 12 student.
Explain what Machine Learning is in simple terms.
Use a real-life cricket analogy.
Give the answer in 3 short bullet points.
"""

# Try both prompts in ChatGPT and compare the difference!
print("Bad prompt:", bad_prompt)
print()
print("Good prompt:", good_prompt)`,
   resources:[{icon:'📺',title:'Prompt Engineering Guide — Hindi',url:'https://www.youtube.com/results?search_query=prompt+engineering+tutorial+hindi+2024'},{icon:'📖',title:'OpenAI Prompt Engineering Docs',url:'https://platform.openai.com/docs/guides/prompt-engineering'}],
   exercise:'Mini Project 22: Write a 4-part prompt for each of these tasks: (1) Get a study plan for your exams, (2) Get ChatGPT to write a formal email to a college, (3) Get a recipe using only 4 ingredients you have at home. Test each in ChatGPT and paste the result.',
   keyTerms:['prompt','role','task','context','format','instruction']},

  {day:30,mod:3,title:'Zero-Shot, Few-Shot & Chain-of-Thought',objectives:['Know 3 core prompting techniques','Use examples inside prompts to guide AI','Make AI show its reasoning step by step'],
   content:`<p class="content-text"><p><strong>Zero-shot prompting</strong>: you give no examples — just ask. Works for simple tasks. <strong>Few-shot prompting</strong>: you give 2–3 examples of input → output before your real question. The AI learns the pattern from your examples. <strong>Chain-of-thought</strong>: you tell the AI "think step by step" — this dramatically improves answers for maths, logic, and reasoning tasks.</p><p>These 3 techniques are used by engineers at Google, OpenAI, and every major AI company. Mastering them is a real skill employers look for.</p></p>`,
   code:`# Few-Shot Prompting Example
few_shot_prompt = """
Classify each sentence as Positive, Negative, or Neutral.

Example 1: "The food was amazing!" -> Positive
Example 2: "I waited 2 hours and nothing happened." -> Negative
Example 3: "The shop opens at 10am." -> Neutral

Now classify this: "The course was okay, nothing special."
"""

# Chain-of-Thought Example
cot_prompt = """
Solve this step by step:
A train travels 120 km in 2 hours. How far will it go in 5 hours?

Think through each step before giving the final answer.
"""

print("Try these prompts in ChatGPT or Gemini!")`,
   resources:[{icon:'📺',title:'Few-Shot Prompting Explained',url:'https://www.youtube.com/results?search_query=few+shot+prompting+explained+2024'},{icon:'🔗',title:'Chain-of-Thought Paper (Google)',url:'https://arxiv.org/abs/2201.11903'}],
   exercise:'Mini Project 23: Pick any 5 product reviews from Amazon.in. Write a few-shot prompt that classifies them as Positive/Negative/Neutral. Test in ChatGPT. Then add "explain your reasoning" and compare the output.',
   keyTerms:['zero-shot','few-shot','chain-of-thought','classification','reasoning','examples']},

  {day:31,mod:3,title:'Prompting for Study & Work',objectives:['Use ChatGPT to summarise long content','Generate quiz questions automatically','Write professional emails with AI'],
   content:`<p class="content-text"><p>The fastest learners are not those who know more — they are those who use AI as a personal tutor, editor, and assistant. Today you learn 5 practical prompt patterns you can use every day: Summarise, Quiz Me, Explain Like I am 12, Improve My Writing, and Translate to Simple Language.</p><p>These skills alone justify the course fee. Students who use these daily study 40% faster and write better assignments than those who don't.</p></p>`,
   code:`# 5 Prompt Patterns You Will Use Every Day

# 1. Summarise
summarise = "Summarise this in 5 bullet points for a Class 12 student: [paste your text]"

# 2. Quiz Me
quiz_me = "I just studied Newton's Laws. Give me 5 multiple choice questions to test myself. Show answers at the end."

# 3. Explain Like I'm 12
eli12 = "Explain gradient descent like I am 12 years old. Use a simple real-world example."

# 4. Improve My Writing
improve = "Improve this paragraph. Make it clearer and more professional. Keep the same meaning: [paste your paragraph]"

# 5. Translate to Simple Language
simplify = "Translate this academic paragraph into simple conversational English: [paste text]"

for i, prompt in enumerate([summarise, quiz_me, eli12, improve, simplify], 1):
    print(f"Pattern {i}:", prompt[:60], "...")`,

  {day:32,mod:3,title:'Gemini, Copilot & AI Tools Landscape',objectives:['Compare ChatGPT vs Gemini vs Copilot','Know which tool to use for which task','Use Gemini for image understanding'],
   content:`<p class="content-text"><p>There are now 10+ major AI tools. You do not need to know all of them — you need to know the best tool for each job. <strong>ChatGPT</strong>: best for writing, coding, analysis. <strong>Gemini</strong>: best when you need Google Search + AI combined, and for analysing images or documents. <strong>Microsoft Copilot</strong>: best for Office documents (Word, Excel, PowerPoint). <strong>Perplexity</strong>: best for research with real-time sources.</p><p>Understanding this landscape makes you valuable — you can guide your team or class to the right tool instantly.</p></p>`,
   code:`# AI Tool Decision Guide
def which_ai_tool(task):
    tool_map = {
        "write an essay": "ChatGPT (GPT-4)",
        "research with sources": "Perplexity AI",
        "analyse an image": "Gemini or ChatGPT Vision",
        "summarise a PDF": "Gemini or Claude",
        "help with Excel": "Microsoft Copilot",
        "write Python code": "ChatGPT or GitHub Copilot",
        "generate an image": "DALL-E (ChatGPT Plus) or Canva AI",
        "translate language": "DeepL or ChatGPT",
    }
    return tool_map.get(task.lower(), "ChatGPT (general purpose)")

# Test it
tasks = ["research with sources", "analyse an image", "help with Excel"]
for t in tasks:
    print(f"Task: {t} -> Use: {which_ai_tool(t)}")`,
   resources:[{icon:'🔗',title:'Gemini',url:'https://gemini.google.com'},{icon:'🔗',title:'Perplexity AI',url:'https://www.perplexity.ai'},{icon:'🔗',title:'Microsoft Copilot',url:'https://copilot.microsoft.com'}],
   exercise:'Mini Project 25: Give the same prompt to ChatGPT, Gemini, and Perplexity: "What are the top 5 AI jobs in India in 2025?" Compare the three answers. Which was most useful? Why?',
   keyTerms:['ChatGPT','Gemini','Copilot','Perplexity','AI tools','comparison']},

import google.generativeai as genai

genai.configure(api_key="YOUR_GEMINI_API_KEY")
model = genai.GenerativeModel('gemini-1.5-flash')

response = model.generate_content(

   resources:[{title:"Streamlit Getting Started",url:"https://www.youtube.com/results?search_query=streamlit+getting+started+tutorial+2024"},{title:"Gemini API Python Quickstart",url:"https://www.youtube.com/results?search_query=Gemini+API+Python+tutorial+2024"}],
